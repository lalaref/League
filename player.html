<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 球員檔案">
    <meta name="theme-color" content="#1a1a2e">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-S64W9C7CYZ"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-S64W9C7CYZ');

    <title>球員檔案 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="/" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="/" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="player.html" class="nav-link active" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="rules.html" class="nav-link" role="menuitem">比賽章程</a></li>
                    <li role="none"><a href="archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主要內容區域 -->
    <main class="main-content">
        <!-- 球員基本資料區域 -->
        <section class="section player-hero" aria-label="球員基本資料">
            <div class="container">
                <div class="player-profile-card">
                    <div class="player-photo-wrapper">
                        <img id="player-photo" src="images/logo.svg" alt="" class="player-photo">
                    </div>
                    <div class="player-info">
                        <h1 id="player-name" class="player-name">—</h1>
                        <div class="player-meta">
                            <span class="player-number" id="player-number"></span>
                            <span class="player-team-link" id="player-team-name"></span>
                        </div>
                        <div class="player-details">
                            <div class="player-detail-item">
                                <span class="detail-label" data-i18n="player.position">位置</span>
                                <span class="detail-value" id="player-position">—</span>
                            </div>
                            <div class="player-detail-item">
                                <span class="detail-label" data-i18n="player.gamesPlayed">出場次數</span>
                                <span class="detail-value" id="player-games">—</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 賽季平均數據 -->
        <section class="section" aria-label="賽季平均數據">
            <div class="container">
                <h2 class="section-title" data-i18n="player.seasonAvg">賽季平均數據</h2>
                <div class="stat-cards" id="season-avg-cards">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>

        <!-- 分頁導航 -->
        <section class="section player-tabs-section">
            <div class="container">
                <div class="tabs" role="tablist" aria-label="球員數據分頁">
                    <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="tab-trend" id="tab-btn-trend" data-tab="trend" data-i18n="player.trendChart">得分趨勢</button>
                    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-gamelogs" id="tab-btn-gamelogs" data-tab="gamelogs" data-i18n="player.gameLogs">逐場記錄</button>
                    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-advanced" id="tab-btn-advanced" data-tab="advanced" data-i18n="player.advancedStats">進階數據</button>
                    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-achievements" id="tab-btn-achievements" data-tab="achievements" data-i18n="player.achievements">成就展示櫃</button>
                    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-shotchart" id="tab-btn-shotchart" data-tab="shotchart" data-i18n="player.shotChart">投籃熱力圖</button>
                </div>

                <!-- 得分趨勢分頁 -->
                <div class="tab-panel active" role="tabpanel" id="tab-trend" aria-labelledby="tab-btn-trend">
                    <div class="chart-container">
                        <canvas id="trend-chart" aria-label="最近 5 場得分趨勢折線圖"></canvas>
                    </div>
                </div>

                <!-- 逐場記錄分頁 -->
                <div class="tab-panel" role="tabpanel" id="tab-gamelogs" aria-labelledby="tab-btn-gamelogs">
                    <div class="table-wrapper">
                        <table class="data-table" id="gamelogs-table">
                            <thead>
                                <tr>
                                    <th data-i18n="table.date">日期</th>
                                    <th data-i18n="table.opponent">對手</th>
                                    <th data-i18n="table.result">結果</th>
                                    <th data-i18n="table.pts">得分</th>
                                    <th data-i18n="table.reb">籃板</th>
                                    <th data-i18n="table.ast">助攻</th>
                                    <th data-i18n="table.stl">抄截</th>
                                    <th data-i18n="table.blk">封阻</th>
                                    <th data-i18n="table.fgPct">投籃命中率</th>
                                    <th data-i18n="table.tpPct">三分命中率</th>
                                    <th data-i18n="table.ftPct">罰球命中率</th>
                                </tr>
                            </thead>
                            <tbody id="gamelogs-body">
                                <!-- 動態載入 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 進階數據分頁 -->
                <div class="tab-panel" role="tabpanel" id="tab-advanced" aria-labelledby="tab-btn-advanced">
                    <div class="advanced-stats-grid" id="advanced-stats-grid">
                        <!-- 動態載入 -->
                    </div>
                </div>

                <!-- 成就展示櫃分頁 -->
                <div class="tab-panel" role="tabpanel" id="tab-achievements" aria-labelledby="tab-btn-achievements">
                    <div class="achievements-showcase" id="achievements-showcase">
                        <!-- 動態載入 -->
                    </div>
                </div>

                <!-- 投籃熱力圖分頁 -->
                <div class="tab-panel" role="tabpanel" id="tab-shotchart" aria-labelledby="tab-btn-shotchart">
                    <div class="shotchart-filter">
                        <label for="shotchart-game-filter" class="shotchart-filter-label" data-i18n="player.filterByGame">篩選比賽</label>
                        <select id="shotchart-game-filter" class="shotchart-filter-select">
                            <option value="" data-i18n="player.allGames">所有比賽（整季）</option>
                        </select>
                    </div>
                    <div class="chart-container shotchart-container">
                        <canvas id="shotchart-canvas" aria-label="投籃熱力圖"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 多賽季平均數據對比 -->
        <section class="section" aria-label="多賽季數據對比" id="multi-season-section" style="display:none;">
            <div class="container">
                <h2 class="section-title" data-i18n="player.multiSeason">多賽季數據對比</h2>
                <div class="table-wrapper">
                    <table class="data-table" id="multi-season-table">
                        <thead>
                            <tr>
                                <th data-i18n="common.season">賽季</th>
                                <th data-i18n="player.gamesPlayed">出場次數</th>
                                <th data-i18n="table.pts">得分</th>
                                <th data-i18n="table.reb">籃板</th>
                                <th data-i18n="table.ast">助攻</th>
                                <th data-i18n="table.stl">抄截</th>
                                <th data-i18n="table.blk">封阻</th>
                                <th data-i18n="table.fgPct">投籃命中率</th>
                            </tr>
                        </thead>
                        <tbody id="multi-season-body">
                            <!-- 動態載入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-links">
                    <a href="/" data-i18n="nav.home">首頁</a>
                    <a href="schedule.html" data-i18n="nav.schedule">賽程</a>
                    <a href="team.html" data-i18n="nav.teams">球隊</a>
                    <a href="standings.html" data-i18n="nav.standings">排行榜</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

        I18n.init();
    </script>

</body>
