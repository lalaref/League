<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 香港私人籃球聯賽數據平台">
    <meta name="keywords" content="ALL-IN, 籃球, 聯賽, 香港, basketball, league, Hong Kong">
    <meta name="author" content="ALL-IN Basketball League">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:title" content="ALL-IN Basketball League">
    <meta property="og:description" content="香港私人籃球聯賽數據平台 - 賽程、球隊、球員、排行榜">
    <meta property="og:type" content="website">
    <meta property="og:image" content="frontend/images/logo.svg">
    <title>ALL-IN Basketball League</title>
    <link rel="stylesheet" href="frontend/css/styles.css">
    <link rel="stylesheet" href="frontend/css/responsive.css">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="frontend/images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="frontend/schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="frontend/team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="frontend/player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="frontend/standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="frontend/archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="frontend/admin/index.html" class="nav-link" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主要內容區域 -->
    <main class="main-content">
        <!-- 英雄區域 -->
        <section class="hero-section" aria-label="聯賽橫幅">
            <div class="container">
                <h1 class="hero-title" data-i18n="home.title">ALL-IN Basketball League</h1>
                <p class="hero-subtitle" data-i18n="home.subtitle">香港私人籃球聯賽數據平台</p>
            </div>
        </section>

        <!-- 最近比賽結果 -->
        <section class="section recent-games" aria-label="最近比賽結果">
            <div class="container">
                <h2 class="section-title" data-i18n="home.recentGames">最近比賽結果</h2>
                <div id="recent-games-list" class="games-grid">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>

        <!-- 即將進行的賽程 -->
        <section class="section upcoming-games" aria-label="即將進行的賽程">
            <div class="container">
                <h2 class="section-title" data-i18n="home.upcomingGames">即將進行的賽程</h2>
                <div id="upcoming-games-list" class="games-grid">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>

        <!-- 聯賽公告 -->
        <section class="section announcements" aria-label="聯賽公告">
            <div class="container">
                <h2 class="section-title" data-i18n="home.announcements">聯賽公告</h2>
                <div id="announcements-list" class="announcements-list">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>

        <!-- 球隊排名 -->
        <section class="section standings-preview" aria-label="球隊排名">
            <div class="container">
                <h2 class="section-title" data-i18n="home.standings">球隊排名</h2>
                <div class="table-wrapper">
                    <table id="standings-table" class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.rank">排名</th>
                                <th data-i18n="table.team">球隊</th>
                                <th data-i18n="table.wins">勝</th>
                                <th data-i18n="table.losses">負</th>
                                <th data-i18n="table.pct">勝率</th>
                                <th data-i18n="table.gb">勝差</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 動態載入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 最近成就 -->
        <section class="section recent-achievements" aria-label="最近成就">
            <div class="container">
                <h2 class="section-title" data-i18n="home.achievements">最近成就</h2>
                <div id="achievements-list" class="achievements-list">
                    <!-- 動態載入 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="frontend/images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">香港私人籃球聯賽數據平台</p>
                </div>
                <div class="footer-links">
                    <a href="index.html" data-i18n="nav.home">首頁</a>
                    <a href="frontend/schedule.html" data-i18n="nav.schedule">賽程</a>
                    <a href="frontend/team.html" data-i18n="nav.teams">球隊</a>
                    <a href="frontend/standings.html" data-i18n="nav.standings">排行榜</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script src="frontend/js/utils.js"></script>
    <script src="frontend/js/api.js"></script>
    <script src="frontend/js/i18n.js"></script>
    <script src="frontend/js/navigation.js"></script>
    <script src="frontend/js/dashboard.js"></script>
    <script>
        // 初始化國際化模組
        I18n.init();
    </script>
</body>
</html>
