    <link rel="stylesheet" href="frontend/css/responsive.css">
    <style>
        /* === Banner-only styles (scoped, no Tailwind needed) === */
        .allin-banner { position:relative; width:100%; max-width:1414px; margin:0 auto; height:200px; background:#000; overflow:hidden; box-shadow:0 0 120px rgba(37,99,235,0.4); border-top:1px solid rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.1); }
        @media(min-width:640px){ .allin-banner { height:320px; } }
        @media(min-width:768px){ .allin-banner { height:450px; } }
        .allin-banner * { margin:0; padding:0; box-sizing:border-box; }
        .allin-banner .bg-layer { position:absolute; inset:0; background:#0a0a0a; }
        .allin-banner .bg-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:1200px; height:400px; background:rgba(37,99,235,0.25); filter:blur(180px); }
        .allin-banner svg { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
        .allin-banner .shattered { position:absolute; inset:0; display:flex; justify-content:center; align-items:center; z-index:1; pointer-events:none; user-select:none; }
        .allin-banner .shattered h2 { font-family:'Oswald',sans-serif !important; font-weight:700 !important; font-size:10rem !important; line-height:1 !important; transform:skewX(-12deg) !important; opacity:0.5; -webkit-text-stroke:3px rgba(59,130,246,0.15) !important; color:transparent !important; letter-spacing:0.05em !important; clip-path:polygon(0% 0%,100% 0%,100% 48%,0% 52%,0% 100%,100% 100%,100% 52%,0% 48%) !important; }
        @media(min-width:640px){ .allin-banner .shattered h2 { font-size:25rem !important; } }
        @media(min-width:768px){ .allin-banner .shattered h2 { font-size:45rem !important; } }
        .allin-banner .sparks { position:absolute; inset:0; pointer-events:none; z-index:5; }
        @keyframes allin-sparks { 0%{transform:translateY(0) scale(1) rotate(0);opacity:0} 50%{opacity:0.8} 100%{transform:translateY(-200px) scale(0) rotate(360deg);opacity:0} }
        .allin-banner .spark { position:absolute; width:3px; height:3px; background:#60a5fa; border-radius:1px; animation:allin-sparks 3s infinite ease-out; }
        @keyframes allin-sweep { 0%{transform:translateX(-100%) skewX(-30deg)} 100%{transform:translateX(250%) skewX(-30deg)} }
        .allin-banner .sweep-light { position:absolute; inset:0; width:33%; height:100%; background:linear-gradient(to right,transparent,rgba(255,255,255,0.1),transparent); z-index:30; pointer-events:none; animation:allin-sweep 2.5s infinite linear; }
        .allin-banner .main-visual { position:relative; z-index:10; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 16px; }
        .allin-banner .cn-wrap { position:relative; margin-bottom:8px; }
        .allin-banner .cn-shadow { position:absolute; inset:0; font-family:'Zhi Mang Xing',cursive !important; color:#1e3a8a !important; font-size:5rem !important; line-height:0.7 !important; transform:rotate(-2deg) scaleY(1.3) translateY(3px); filter:blur(10px); opacity:0.8; }
        @media(min-width:640px){ .allin-banner .cn-shadow { font-size:10rem !important; } }
        @media(min-width:768px){ .allin-banner .cn-shadow { font-size:18rem !important; } }
        .allin-banner .cn-text { font-family:'Zhi Mang Xing',cursive !important; font-size:5rem !important; line-height:0.7 !important; transform:rotate(-2deg) scaleY(1.3); letter-spacing:-0.05em; user-select:none; position:relative; z-index:20; background:linear-gradient(to bottom,#fff 40%,#cbd5e1 100%) !important; -webkit-background-clip:text !important; background-clip:text !important; -webkit-text-fill-color:transparent !important; color:transparent !important; filter:drop-shadow(0 0 15px rgba(255,255,255,0.4)) drop-shadow(0 0 50px rgba(37,99,235,0.7)) !important; }
        @media(min-width:640px){ .allin-banner .cn-text { font-size:10rem !important; } }
        @media(min-width:768px){ .allin-banner .cn-text { font-size:18rem !important; } }
        .allin-banner .en-wrap { margin-top:32px; position:relative; transition:transform 0.5s; -webkit-box-reflect:below -5px linear-gradient(transparent,rgba(255,255,255,0.1)); }
        @media(min-width:640px){ .allin-banner .en-wrap { margin-top:48px; } }
        @media(min-width:768px){ .allin-banner .en-wrap { margin-top:24px; } }
        .allin-banner:hover .en-wrap { transform:scale(1.05); }
        .allin-banner .en-label { background:#fff !important; color:#000 !important; font-family:'Oswald',sans-serif !important; font-style:italic; font-size:12px !important; padding:6px 24px !important; transform:skewX(-12deg); box-shadow:0 0 50px rgba(255,255,255,0.5); border-right:8px solid #2563eb; display:inline-block; }
        @media(min-width:640px){ .allin-banner .en-label { font-size:20px !important; padding:8px 60px !important; } }
        @media(min-width:768px){ .allin-banner .en-label { font-size:30px !important; padding:8px 80px !important; } }
        .allin-banner .en-label span { display:block; transform:skewX(12deg); letter-spacing:0.5em; text-transform:uppercase; }
        @media(min-width:768px){ .allin-banner .en-label span { letter-spacing:0.6em; } }
        .allin-banner .en-bar-left { position:absolute; left:-32px; top:0; width:16px; height:100%; background:#3b82f6; transform:skewX(-12deg); }
        .allin-banner .en-bar-bottom { position:absolute; right:-8px; bottom:-8px; width:100%; height:4px; background:rgba(96,165,250,0.3); }
    </style>
</head>

                    <li role="none"><a href="frontend/admin/index.html" class="nav-link" role="menuitem" data-i18n="nav.admin">管理後台</a></li>

    <main class="main-content">
        <!-- ===== ALL-IN Banner (pure CSS, no Tailwind) ===== -->
        <section class="allin-banner" aria-label="聯賽橫幅">
            <div class="bg-layer"><div class="bg-glow"></div></div>
            <svg preserveAspectRatio="none" viewBox="0 0 1414 450" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="bg-grad" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#020617"/><stop offset="45%" stop-color="#1e40af"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
                <path d="M-150,450 L750,450 L1050,0 L-150,0 Z" fill="url(#bg-grad)" opacity="0.95"/>
                <path d="M1564,450 L914,450 L614,0 L1564,0 Z" fill="#1e3a8a" opacity="0.4"/>
            </svg>
            <div class="shattered"><h2>ALL IN</h2></div>
            <div class="sparks">
                <div class="spark" style="left:10%;bottom:5%;animation-delay:0.1s"></div>
                <div class="spark" style="left:35%;bottom:12%;animation-delay:1.5s"></div>
                <div class="spark" style="left:60%;bottom:8%;animation-delay:0.7s"></div>
                <div class="spark" style="left:20%;bottom:18%;animation-delay:2.1s"></div>
                <div class="spark" style="left:85%;bottom:10%;animation-delay:1.2s"></div>
                <div class="spark" style="left:50%;bottom:15%;animation-delay:0.4s"></div>
                <div class="spark" style="left:75%;bottom:20%;animation-delay:2.8s"></div>
            </div>
            <div class="main-visual">
                <div class="cn-wrap">
                    <span class="cn-shadow">全力以赴</span>
                    <h1 class="cn-text">全力以赴</h1>
                </div>
                <div class="en-wrap">
                    <div class="en-label"><span>ALL-IN Basketball League</span></div>
                    <div class="en-bar-left"></div>
                    <div class="en-bar-bottom"></div>
                </div>
            </div>
            <div class="sweep-light"></div>
        </section>

        <!-- 最近比賽結果 -->
        <section class="section recent-games" aria-label="最近比賽結果">
            <div class="container">
                <h2 class="section-title" data-i18n="home.recentGames">最近比賽結果</h2>
                <div id="recent-games-list" class="games-grid"></div>
            </div>
        </section>

        <!-- 即將進行的賽程 -->
        <section class="section upcoming-games" aria-label="即將進行的賽程">
            <div class="container">
                <h2 class="section-title" data-i18n="home.upcomingGames">即將進行的賽程</h2>
                <div id="upcoming-games-list" class="games-grid"></div>
            </div>
        </section>

        <!-- 聯賽公告 -->
        <section class="section announcements" aria-label="聯賽公告">
            <div class="container">
                <h2 class="section-title" data-i18n="home.announcements">聯賽公告</h2>

        </section>

        <!-- 球隊排名 -->
        <section class="section standings-preview" aria-label="球隊排名">

                <h2 class="section-title" data-i18n="home.standings">球隊排名</h2>
                <div class="table-wrapper">
                    <table id="standings-table" class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.rank">排名</th>
                                <th data-i18n="table.team">球隊</th>
                                <th data-i18n="table.wins">勝</th>
                                <th data-i18n="table.losses">負</th>
                                <th data-i18n="table.pct">勝率</th>
                                <th data-i18n="table.gb">勝差</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 最近成就 -->
        <section class="section recent-achievements" aria-label="最近成就">
            <div class="container">
                <h2 class="section-title" data-i18n="home.achievements">最近成就</h2>
                <div id="achievements-list" class="achievements-list"></div>
            </div>
        </section>
