    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">

                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">

                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主要內容區域 -->
    <main class="main-content">
        <!-- 頁面標題及賽季選擇 -->
        <section class="section hero-section" aria-label="歷史檔案標題">
            <div class="container">
                <h1 class="hero-title" data-i18n="archive.title">歷史檔案</h1>
                <div class="standings-controls">
                    <label for="archive-season-select" class="sr-only" data-i18n="archive.selectSeason">選擇歷史賽季</label>
                    <select id="archive-season-select" class="h2h-select" aria-label="選擇歷史賽季" data-i18n-attr="aria-label:archive.selectSeason">
                        <option value="" data-i18n="common.loading">載入中...</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- 無已完結賽季提示 -->
        <section id="archive-empty" class="section" style="display:none;">
            <div class="container text-center">
                <p class="text-muted" data-i18n="archive.noCompleted">尚無已完結賽季</p>
            </div>
        </section>

        <!-- 賽季摘要列表（未選擇特定賽季時顯示） -->
        <section id="archive-season-list" class="section" style="display:none;" aria-label="已完結賽季列表">
            <div class="container">
                <div id="season-cards" class="archive-season-cards"></div>
            </div>
        </section>

        <!-- 選定賽季的詳細檔案 -->
        <section id="archive-detail" class="section" style="display:none;" aria-label="賽季詳細檔案">
            <div class="container">
                <!-- 獎項區域 -->
                <div class="archive-awards-section">
                    <h2 class="section-title" data-i18n="archive.awards">獎項</h2>
                    <div id="awards-grid" class="archive-awards-grid"></div>
                </div>

                <!-- 排名表 -->
                <div class="archive-standings-section">
                    <h2 class="section-title" data-i18n="archive.finalStandings">最終排名</h2>
                    <div id="archive-standings-loading" class="loading" data-i18n="common.loading">載入中...</div>
                    <div id="archive-standings-wrapper" class="table-wrapper" style="display:none;">
                        <table class="data-table" aria-label="最終排名表">
                            <thead>
                                <tr>
                                    <th data-i18n="table.rank">排名</th>
                                    <th data-i18n="table.team">球隊</th>
                                    <th data-i18n="table.wins">勝</th>
                                    <th data-i18n="table.losses">負</th>
                                    <th data-i18n="table.pct">勝率</th>
                                </tr>
                            </thead>
                            <tbody id="archive-standings-tbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 季後賽結果 -->
                <div class="archive-playoffs-section">
                    <h2 class="section-title" data-i18n="archive.playoffResults">季後賽結果</h2>
                    <div id="archive-playoffs-empty" class="text-center text-muted" style="display:none;" data-i18n="schedule.noPlayoffs">尚無季後賽數據</div>
                    <div id="archive-playoffs-bracket" class="playoff-bracket-wrapper" style="display:none;">
                        <div id="archive-bracket" class="playoff-bracket" role="img" aria-label="季後賽對陣表"></div>
                    </div>
                </div>

                <!-- 賽季回顧 -->
                <div id="archive-summary-section" class="archive-summary-section" style="display:none;">
                    <h2 class="section-title" data-i18n="archive.seasonSummary">賽季回顧</h2>
                    <div id="archive-summary-text" class="archive-summary-text"></div>
                </div>

                <!-- 精選照片 -->
                <div id="archive-photos-section" class="archive-photos-section" style="display:none;">
                    <h2 class="section-title" data-i18n="archive.photos">精選照片</h2>
                    <div id="archive-photos-grid" class="archive-photos-grid"></div>
                </div>
            </div>
        </section>

        <!-- 跨賽季統計趨勢 -->
        <section id="archive-trends-section" class="section" style="display:none;" aria-label="跨賽季統計趨勢">
            <div class="container">
                <h2 class="section-title" data-i18n="archive.trends">跨賽季統計趨勢</h2>
                <div class="chart-container archive-trend-chart-container">
                    <canvas id="season-trend-chart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">

                </div>

                    <a href="team.html" data-i18n="nav.teams">球隊</a>
                    <a href="standings.html" data-i18n="nav.standings">排行榜</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

        document.getElementById('current-year').textContent = new Date().getFullYear();
