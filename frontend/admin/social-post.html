<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 社交文案生成">
    <meta name="theme-color" content="#1a1a2e">
    <title>社交文案生成 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.socialPost">社交文案</h1>

                <!-- 比賽選擇 -->
                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                        <select id="season-select" class="admin-select"></select>
                    </div>
                    <div class="admin-form-group">
                        <label for="game-select" class="admin-label" data-i18n="shareImage.selectGame">選擇已完成比賽</label>
                        <select id="game-select" class="admin-select" disabled>
                            <option value="">--</option>
                        </select>
                    </div>
                </div>

                <!-- 風格選擇 -->
                <div class="admin-form-group">
                    <label class="admin-label" data-i18n="post.selectStyle">選擇文案風格</label>
                    <div class="admin-toolbar" id="style-selector" role="radiogroup" aria-label="選擇文案風格">
                        <button class="btn btn-outline style-btn active" data-style="formal" role="radio" aria-checked="true">
                            <span data-i18n="post.formal">正式報導</span>
                        </button>
                        <button class="btn btn-outline style-btn" data-style="casual" role="radio" aria-checked="false">
                            <span data-i18n="post.casual">輕鬆社交</span>
                        </button>
                        <button class="btn btn-outline style-btn" data-style="analytics" role="radio" aria-checked="false">
                            <span data-i18n="post.analytics">數據分析</span>
                        </button>
                    </div>
                </div>

                <!-- 提示訊息 -->
                <div id="post-message" class="admin-message" role="alert" hidden></div>

                <!-- 預覽區域：中文 -->
                <div class="admin-card" id="preview-zh-card" hidden>
                    <h2 class="admin-card-title">中文版本</h2>
                    <textarea id="preview-zh" class="admin-textarea" rows="10" aria-label="中文文案預覽"></textarea>
                    <div class="admin-actions" style="margin-top:var(--spacing-sm)">
                        <button class="btn btn-primary btn-sm" id="btn-copy-zh" data-i18n="admin.copy">複製</button>
                    </div>
                </div>

                <!-- 預覽區域：英文 -->
                <div class="admin-card" id="preview-en-card" hidden>
                    <h2 class="admin-card-title">English Version</h2>
                    <textarea id="preview-en" class="admin-textarea" rows="10" aria-label="English post preview"></textarea>
                    <div class="admin-actions" style="margin-top:var(--spacing-sm)">
                        <button class="btn btn-primary btn-sm" id="btn-copy-en" data-i18n="admin.copy">複製</button>
                    </div>
                </div>

                <!-- 操作按鈕 -->
                <div class="admin-actions" id="post-actions" hidden>
                    <button id="btn-generate" class="btn btn-primary" data-i18n="admin.generate">生成</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">香港私人籃球聯賽數據平台</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/post-generator.js"></script>
    <script>
    (function () {
      'use strict';

      var seasonSelect = document.getElementById('season-select');
      var gameSelect = document.getElementById('game-select');
      var styleBtns = document.querySelectorAll('.style-btn');
      var btnGenerate = document.getElementById('btn-generate');
      var btnCopyZh = document.getElementById('btn-copy-zh');
      var btnCopyEn = document.getElementById('btn-copy-en');
      var previewZhCard = document.getElementById('preview-zh-card');
      var previewEnCard = document.getElementById('preview-en-card');
      var previewZh = document.getElementById('preview-zh');
      var previewEn = document.getElementById('preview-en');
      var postActions = document.getElementById('post-actions');
      var messageEl = document.getElementById('post-message');

      var selectedStyle = 'formal';
      var gamesCache = [];
      var teamsCache = {};

      // ─── 初始化 ───
      I18n.init();
      _loadSeasons();

      // ─── 事件綁定 ───
      seasonSelect.addEventListener('change', function () {
        _loadGames(seasonSelect.value);
      });

      gameSelect.addEventListener('change', function () {
        postActions.hidden = !gameSelect.value;
        _resetPreview();
      });

      styleBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          styleBtns.forEach(function (b) {
            b.classList.remove('active');
            b.setAttribute('aria-checked', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-checked', 'true');
          selectedStyle = btn.getAttribute('data-style');
          // 如果已有預覽，重新生成
          if (!previewZhCard.hidden && gameSelect.value) {
            _generatePost();
          }
        });
      });

      btnGenerate.addEventListener('click', _generatePost);

      btnCopyZh.addEventListener('click', function () { _copyToClipboard(previewZh.value); });
      btnCopyEn.addEventListener('click', function () { _copyToClipboard(previewEn.value); });

      // ─── 載入賽季 ───
      function _loadSeasons() {
        API.getSeasons()
          .then(function (seasons) {
            seasonSelect.innerHTML = '<option value="">--</option>';
            if (!seasons || !seasons.length) return;
            seasons.forEach(function (s) {
              var opt = document.createElement('option');
              opt.value = s.id;
              opt.textContent = s.name;
              seasonSelect.appendChild(opt);
            });
            if (seasons.length > 0) {
              seasonSelect.value = seasons[0].id;
              _loadGames(seasons[0].id);
            }
          })
          .catch(function () {
            _showMessage('error', I18n.t('error.loadFailed'));
          });
      }

      // ─── 載入比賽 ───
      function _loadGames(seasonId) {
        if (!seasonId) {
          gameSelect.innerHTML = '<option value="">--</option>';
          gameSelect.disabled = true;
          return;
        }

        Promise.all([
          API.getGames(seasonId),
          API.getTeams(seasonId)
        ])
          .then(function (results) {
            var games = results[0] || [];
            var teams = results[1] || [];

            teamsCache = {};
            teams.forEach(function (t) { teamsCache[t.id] = t; });

            gamesCache = games.filter(function (g) {
              return g.status === 'completed';
            });

            gameSelect.innerHTML = '<option value="">--</option>';
            gamesCache.forEach(function (g) {
              var home = teamsCache[g.homeTeamId];
              var away = teamsCache[g.awayTeamId];
              var homeName = home ? home.name : g.homeTeamId;
              var awayName = away ? away.name : g.awayTeamId;
              var opt = document.createElement('option');
              opt.value = g.id;
              opt.textContent = g.date + ' | ' + homeName + ' ' + (g.homeScore || 0) + ' - ' + (g.awayScore || 0) + ' ' + awayName;
              gameSelect.appendChild(opt);
            });
            gameSelect.disabled = false;
            postActions.hidden = true;
            _resetPreview();
          })
          .catch(function () {
            _showMessage('error', I18n.t('error.loadFailed'));
          });
      }

      // ─── 生成文案 ───
      function _generatePost() {
        var gameId = gameSelect.value;
        if (!gameId) {
          _showMessage('error', I18n.t('admin.noGameSelected'));
          return;
        }

        var game = gamesCache.find(function (g) { return g.id === gameId; });
        if (!game) return;

        btnGenerate.disabled = true;

        API.getBoxScore(gameId)
          .then(function (boxData) {
            var home = teamsCache[game.homeTeamId] || {};
            var away = teamsCache[game.awayTeamId] || {};
            var mvp = PostGenerator._findBestPlayer(boxData);

            var gameData = {
              date: game.date || '',
              homeTeamName: home.name || 'Home',
              awayTeamName: away.name || 'Away',
              homeScore: game.homeScore || 0,
              awayScore: game.awayScore || 0,
              mvp: mvp
            };

            var result = PostGenerator.generateBilingual(gameData, selectedStyle);
            previewZh.value = result.zh;
            previewEn.value = result.en;
            previewZhCard.hidden = false;
            previewEnCard.hidden = false;
            _hideMessage();
          })
          .catch(function (err) {
            _showMessage('error', err.message || I18n.t('error.loadFailed'));
          })
          .finally(function () {
            btnGenerate.disabled = false;
          });
      }

      // ─── 複製至剪貼簿 ───
      function _copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            _showMessage('success', I18n.t('post.copied'));
          }).catch(function () {
            _fallbackCopy(text);
          });
        } else {
          _fallbackCopy(text);
        }
      }

      function _fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          _showMessage('success', I18n.t('post.copied'));
        } catch (e) {
          _showMessage('error', 'Copy failed');
        }
        document.body.removeChild(ta);
      }

      // ─── 重置預覽 ───
      function _resetPreview() {
        previewZhCard.hidden = true;
        previewEnCard.hidden = true;
        previewZh.value = '';
        previewEn.value = '';
      }

      // ─── 訊息顯示 ───
      function _showMessage(type, text) {
        messageEl.hidden = false;
        messageEl.className = 'admin-message admin-message--' + type;
        messageEl.textContent = text;
        setTimeout(function () { messageEl.hidden = true; }, 3000);
      }

      function _hideMessage() {
        messageEl.hidden = true;
      }
    })();
    </script>
</body>
</html>
