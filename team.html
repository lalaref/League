<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 球隊頁面">
    <meta name="theme-color" content="#1a1a2e">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-S64W9C7CYZ"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-S64W9C7CYZ');
        </script>
    <title>球隊頁面 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="/" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="/" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="team.html" class="nav-link active" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="rules.html" class="nav-link" role="menuitem">比賽章程</a></li>
                    <li role="none"><a href="archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主要內容區域 -->
    <main class="main-content">
        <!-- 球隊基本資料區域 -->
        <section class="section team-hero" aria-label="球隊基本資料">
            <div class="container">
                <div class="team-profile-card">
                    <div class="team-logo-wrapper">
                        <img id="team-logo" src="images/logo.svg" alt="" class="team-logo">
                    </div>
                    <div class="team-info">
                        <h1 id="team-name" class="team-name">—</h1>
                        <div class="team-meta">
                            <div class="team-detail-item">
                                <span class="detail-label" data-i18n="team.captain">隊長</span>
                                <span class="detail-value" id="team-captain">—</span>
                            </div>
                            <div class="team-detail-item">
                                <span class="detail-label" data-i18n="team.description">球隊簡介</span>
                                <span class="detail-value" id="team-description">—</span>
                            </div>
                        </div>
                        <!-- 當前賽季戰績 -->
                        <div class="team-record" id="team-record">
                            <span class="detail-label" data-i18n="team.record">戰績</span>
                            <span class="detail-value" id="team-record-value">—</span>
                            <span class="team-rank-badge" id="team-rank-badge"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 球員名單 -->
        <section class="section" aria-label="球員名單">
            <div class="container">
                <h2 class="section-title" data-i18n="team.roster">球員名單</h2>
                <div class="table-wrapper">
                    <table class="data-table" id="roster-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.number">球衣號碼</th>
                                <th data-i18n="table.player">球員</th>
                                <th data-i18n="table.pts">得分</th>
                                <th data-i18n="table.reb">籃板</th>
                                <th data-i18n="table.ast">助攻</th>
                                <th data-i18n="table.stl">抄截</th>
                                <th data-i18n="table.blk">封阻</th>
                                <th data-i18n="table.fgPct">投籃命中率</th>
                            </tr>
                        </thead>
                        <tbody id="roster-body">
                            <!-- 動態載入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 排名歷史 -->
        <section class="section" aria-label="排名歷史" id="history-section" style="display:none;">
            <div class="container">
                <h2 class="section-title" data-i18n="team.history">排名歷史</h2>
                <div class="table-wrapper">
                    <table class="data-table" id="history-table">
                        <thead>
                            <tr>
                                <th data-i18n="common.season">賽季</th>
                                <th data-i18n="table.rank">排名</th>
                                <th data-i18n="table.wins">勝</th>
                                <th data-i18n="table.losses">負</th>
                                <th data-i18n="table.pct">勝率</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- 動態載入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- 球隊對比（H2H） -->
        <section class="section" aria-label="歷史對賽紀錄">
            <div class="container">
                <h2 class="section-title" data-i18n="team.h2h">歷史對賽紀錄</h2>
                <div class="h2h-controls">
                    <label for="h2h-team-select" class="h2h-label" data-i18n="team.selectTeam">選擇對比球隊</label>
                    <select id="h2h-team-select" class="h2h-select">
                        <option value="" data-i18n="team.selectTeam">選擇對比球隊</option>
                    </select>
                </div>
                <div id="h2h-result" class="h2h-result" style="display:none;">
                    <div class="h2h-summary" id="h2h-summary">
                        <!-- 動態載入 -->
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table" id="h2h-table">
                            <thead>
                                <tr>
                                    <th data-i18n="table.date">日期</th>
                                    <th data-i18n="table.score">比分</th>
                                    <th data-i18n="table.result">結果</th>
                                </tr>
                            </thead>
                            <tbody id="h2h-body">
                                <!-- 動態載入 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="h2h-empty" class="text-muted" style="display:none;">
                    <p data-i18n="common.noData">暫無數據</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-links">
                    <a href="/" data-i18n="nav.home">首頁</a>
                    <a href="schedule.html" data-i18n="nav.schedule">賽程</a>
                    <a href="team.html" data-i18n="nav.teams">球隊</a>
                    <a href="standings.html" data-i18n="nav.standings">排行榜</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

    <script src="js/navigation.js?v=20260409"></script>
    <script src="js/team.js"></script>

        I18n.init();
    </script>

</body>
</html>
