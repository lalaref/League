<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 賽程管理">
    <meta name="theme-color" content="#1a1a2e">
    <title>賽程管理 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.scheduleManage">賽程管理</h1>

                <!-- 賽季選擇 -->
                <div class="admin-form-group">
                    <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                    <select id="season-select" class="admin-select"></select>
                </div>

                <div id="schedule-message" class="admin-message" role="alert" hidden></div>

                <!-- 建立比賽按鈕 -->
                <div class="admin-toolbar">
                    <button id="btn-create-game" class="btn btn-primary" data-i18n="admin.createGame" disabled>建立比賽</button>
                    <button id="btn-generate-round-robin" class="btn btn-accent" data-i18n="admin.generateRoundRobin" disabled>生成單循環賽程</button>
                    <button id="btn-generate-playoffs" class="btn btn-outline" data-i18n="admin.generatePlayoffs" disabled>一鍵生成季後賽</button>
                </div>

                <!-- 單循環賽程生成器 -->
                <div id="round-robin-panel" class="admin-card" hidden>
                    <h2 class="admin-card-title" data-i18n="admin.roundRobinTitle">單循環賽程</h2>
                    <p class="admin-hint" data-i18n="admin.roundRobinHint">8 隊單循環，每隊 7 場。可更換隊伍，剩餘賽程自動重新配對。填入日期及場地後即可發佈。</p>

                    <div id="rr-matchups" class="rr-matchups-grid"></div>

                    <div class="admin-actions" style="margin-top:16px;">
                        <button id="btn-rr-publish-all" class="btn btn-primary" data-i18n="admin.publishAll" disabled>發佈所有已填賽程</button>
                        <button id="btn-rr-close" class="btn btn-outline" data-i18n="admin.cancel">取消</button>
                    </div>
                </div>

                <!-- 比賽表單 (建立/編輯) -->
                <div id="game-form" class="admin-card" hidden>
                    <h2 id="game-form-title" class="admin-card-title" data-i18n="admin.createGame">建立比賽</h2>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="game-date" class="admin-label" data-i18n="admin.gameDate">比賽日期</label>
                            <input type="date" id="game-date" class="admin-input" required>
                        </div>
                        <div class="admin-form-group">
                            <label for="game-time" class="admin-label" data-i18n="admin.gameTime">比賽時間</label>
                            <input type="time" id="game-time" class="admin-input" required>
                        </div>
                    </div>
                    <div class="admin-form-group">
                        <label for="game-venue" class="admin-label" data-i18n="admin.gameVenue">比賽場地</label>
                        <input type="text" id="game-venue" class="admin-input" required>
                    </div>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="home-team-select" class="admin-label" data-i18n="admin.homeTeam">主隊</label>
                            <select id="home-team-select" class="admin-select" required></select>
                        </div>
                        <div class="admin-form-group">
                            <label for="away-team-select" class="admin-label" data-i18n="admin.awayTeam">客隊</label>
                            <select id="away-team-select" class="admin-select" required></select>
                        </div>
                    </div>
                    <div class="admin-form-group">
                        <label for="game-type" class="admin-label" data-i18n="admin.gameType">比賽類型</label>
                        <select id="game-type" class="admin-select">
                            <option value="regular" data-i18n="admin.regular">常規賽</option>
                            <option value="playoff" data-i18n="admin.playoff">季後賽</option>
                        </select>
                    </div>
                    <div class="admin-actions">
                        <button id="btn-save-game" class="btn btn-primary" data-i18n="admin.save">儲存</button>
                        <button id="btn-cancel-game" class="btn btn-outline" data-i18n="admin.cancel">取消</button>
                    </div>
                </div>

                <!-- 比賽列表 -->
                <div class="table-wrapper">
                    <table class="data-table" id="games-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.date">日期</th>
                                <th data-i18n="table.time">時間</th>
                                <th data-i18n="table.venue">場地</th>
                                <th data-i18n="schedule.matchup">對陣</th>
                                <th data-i18n="admin.gameType">類型</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="games-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script src="schedule.js?v=20260422"></script>
    <script>I18n.init();</script>
</body>
</html>
