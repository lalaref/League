<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 球隊管理">
    <meta name="theme-color" content="#1a1a2e">
    <title>球隊管理 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.teamManage">球隊管理</h1>
                <div id="team-message" class="admin-message" role="alert" hidden></div>

                <!-- 賽季選擇 -->
                <div class="admin-form-group">
                    <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                    <select id="season-select" class="admin-select"></select>
                </div>

                <div class="admin-toolbar">
                    <button id="btn-create-team" class="btn btn-primary" data-i18n="admin.createTeam" disabled>建立球隊</button>
                    <button id="btn-show-import" class="btn btn-outline" disabled>由其他賽季複製球隊</button>
                </div>

                <div id="team-import-card" class="admin-card" hidden>
                    <h2 class="admin-card-title">由其他賽季複製球隊</h2>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="import-source-season" class="admin-label">來源賽季</label>
                            <select id="import-source-season" class="admin-select"></select>
                        </div>
                    </div>
                    <div class="admin-toolbar">
                        <button id="btn-load-import-teams" class="btn btn-outline">載入來源球隊</button>
                        <button id="btn-select-all-import" class="btn btn-outline" hidden>全選</button>
                    </div>
                    <div id="import-teams-list" class="admin-card" style="background:var(--color-bg);margin:var(--spacing-md) 0" hidden></div>
                    <div class="admin-actions">
                        <button id="btn-copy-import-teams" class="btn btn-primary" hidden>複製已選球隊到目前賽季</button>
                        <button id="btn-cancel-import" class="btn btn-outline">取消</button>
                    </div>
                </div>

                <!-- 球隊表單 -->
                <div id="team-form" class="admin-card" hidden>
                    <h2 id="team-form-title" class="admin-card-title" data-i18n="admin.createTeam">建立球隊</h2>
                    <div class="admin-form-group">
                        <label for="team-name" class="admin-label" data-i18n="admin.teamName">球隊名稱</label>
                        <input type="text" id="team-name" class="admin-input" required>
                    </div>
                    <div class="admin-form-group">
                        <label for="team-division" class="admin-label">分組</label>
                        <input type="text" id="team-division" class="admin-input" list="division-options" placeholder="A / B / C">
                        <datalist id="division-options">
                            <option value="A"></option>
                            <option value="B"></option>
                            <option value="C"></option>
                        </datalist>
                    </div>
                    <div class="admin-form-group">
                        <label for="team-logo" class="admin-label" data-i18n="admin.logo">隊徽 URL</label>
                        <input type="url" id="team-logo" class="admin-input">
                    </div>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="team-captain" class="admin-label">負責人</label>
                            <input type="text" id="team-captain" class="admin-input">
                        </div>
                        <div class="admin-form-group">
                            <label for="team-whatsapp" class="admin-label">負責人 WhatsApp</label>
                            <input type="tel" id="team-whatsapp" class="admin-input">
                        </div>
                    </div>
                    <div class="admin-form-group">
                        <label for="team-desc" class="admin-label" data-i18n="team.description">球隊簡介</label>
                        <textarea id="team-desc" class="admin-textarea" rows="3"></textarea>
                    </div>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="team-jersey-home" class="admin-label">主場球衣顏色</label>
                            <input type="text" id="team-jersey-home" class="admin-input" placeholder="例：白色 或 #ffffff">
                        </div>
                        <div class="admin-form-group">
                            <label for="team-jersey-away" class="admin-label">客場球衣顏色</label>
                            <input type="text" id="team-jersey-away" class="admin-input" placeholder="例：黑色 或 #000000">
                        </div>
                    </div>
                    <div class="admin-actions">
                        <button id="btn-save-team" class="btn btn-primary" data-i18n="admin.save">儲存</button>
                        <button id="btn-cancel-team" class="btn btn-outline" data-i18n="admin.cancel">取消</button>
                    </div>
                </div>

                <!-- 球隊列表 -->
                <div class="table-wrapper">
                    <table class="data-table" id="teams-table">
                        <thead>
                            <tr>
                                <th data-i18n="admin.teamName">球隊名稱</th>
                                <th>分組</th>
                                <th>球衣顏色</th>
                                <th>負責人</th>
                                <th>負責人 WhatsApp</th>
                                <th>自助管理連結</th>
                                <th>不可出賽日期連結</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="teams-body">
                            <tr><td colspan="8" class="text-muted" data-i18n="common.loading">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script>
    I18n.init();

    (function () {
        var editingId = null;
        var seasonSelect = document.getElementById('season-select');
        var msgEl = document.getElementById('team-message');
        var formEl = document.getElementById('team-form');
        var formTitle = document.getElementById('team-form-title');
        var tbody = document.getElementById('teams-body');
        var createBtn = document.getElementById('btn-create-team');
        var importBtn = document.getElementById('btn-show-import');
        var importCard = document.getElementById('team-import-card');
        var importSourceSeason = document.getElementById('import-source-season');
        var importTeamsList = document.getElementById('import-teams-list');
        var loadImportTeamsBtn = document.getElementById('btn-load-import-teams');
        var selectAllImportBtn = document.getElementById('btn-select-all-import');
        var copyImportTeamsBtn = document.getElementById('btn-copy-import-teams');
        var cancelImportBtn = document.getElementById('btn-cancel-import');
        var allSeasons = [];

        function showMsg(text, type) {
            msgEl.textContent = text;
            msgEl.className = 'admin-message admin-message--' + type;
            msgEl.hidden = false;
            setTimeout(function () { msgEl.hidden = true; }, 4000);
        }

        function resetForm() {
            editingId = null;
            formTitle.textContent = I18n.t('admin.createTeam');
            document.getElementById('team-name').value = '';
            document.getElementById('team-division').value = '';
            document.getElementById('team-logo').value = '';
            document.getElementById('team-captain').value = '';
            document.getElementById('team-whatsapp').value = '';
            document.getElementById('team-desc').value = '';
            document.getElementById('team-jersey-home').value = '';
            document.getElementById('team-jersey-away').value = '';
            formEl.hidden = true;
        }

        function loadSeasons() {
            API.getSeasons().then(function (seasons) {
                allSeasons = seasons || [];
                seasonSelect.innerHTML = '<option value="">--</option>';
                importSourceSeason.innerHTML = '<option value="">--</option>';
                allSeasons.forEach(function (s) {
                    var opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.name;
                    seasonSelect.appendChild(opt);

                    var importOpt = document.createElement('option');
                    importOpt.value = s.id;
                    importOpt.textContent = s.name;
                    importSourceSeason.appendChild(importOpt);
                });
            });
        }

        function loadTeams() {
            var sid = seasonSelect.value;
            if (!sid) { tbody.innerHTML = '<tr><td colspan="8" class="text-muted">' + I18n.t('common.noData') + '</td></tr>'; return; }
            API.getTeams(sid).then(function (teams) {
                if (!teams || teams.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-muted">' + I18n.t('common.noData') + '</td></tr>';
                    return;
                }

                // Auto-generate tokens for teams that don't have one — fire & forget (don't block rendering)
                teams.forEach(function(t) {
                    if (!t.teamToken) {
                        t.teamToken = _genToken();
                        API.post('updateTeam', { teamId: t.id, seasonId: sid, teamToken: t.teamToken }).catch(function(){});
                    }
                });

                // Render immediately
                _renderTeamsTable(teams, sid);
            }).catch(function () {
                tbody.innerHTML = '<tr><td colspan="8" class="text-muted">' + I18n.t('error.loadFailed') + '</td></tr>';
            });
        }

        function _renderTeamsTable(teams, sid) {
            tbody.innerHTML = '';
            teams.forEach(function (t) {
                var tr = document.createElement('tr');
                                var siteRoot = window.location.origin + window.location.pathname.replace(/\/admin\/teams\.html.*$/, '');
                                var manageUrl = t.teamToken ? (siteRoot + '/team-manage.html?token=' + t.teamToken) : '';
                                var availabilityUrl = t.teamToken ? (siteRoot + '/team-availability.html?token=' + t.teamToken) : '';
                var linkHtml = manageUrl
                    ? '<div style="font-size:0.72rem;word-break:break-all;margin-bottom:4px">'
                      + '<a href="' + manageUrl + '" target="_blank" rel="noopener">' + manageUrl + '</a>'
                      + '</div>'
                                            + '<button class="btn btn-sm btn-outline btn-copy" data-url="' + _esc(manageUrl) + '">複製管理連結</button>'
                                        : '—';
                                var availabilityLinkHtml = availabilityUrl
                                        ? '<div style="font-size:0.72rem;word-break:break-all;margin-bottom:4px">'
                                            + '<a href="' + availabilityUrl + '" target="_blank" rel="noopener">' + availabilityUrl + '</a>'
                                            + '</div>'
                                            + '<button class="btn btn-sm btn-outline btn-copy" data-url="' + _esc(availabilityUrl) + '">複製填報連結</button>'
                    : '—';
                var jerseyHtml = '';
                if (t.jerseyHome) jerseyHtml += '<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:' + _jerseyColor(t.jerseyHome) + ';border:1px solid rgba(255,255,255,0.2);vertical-align:middle"></span> 主:' + _esc(t.jerseyHome);
                if (t.jerseyHome && t.jerseyAway) jerseyHtml += '<br>';
                if (t.jerseyAway) jerseyHtml += '<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:' + _jerseyColor(t.jerseyAway) + ';border:1px solid rgba(255,255,255,0.2);vertical-align:middle"></span> 客:' + _esc(t.jerseyAway);
                if (!jerseyHtml) jerseyHtml = '—';
                tr.innerHTML =
                    '<td>' + _esc(t.name) + '</td>' +
                    '<td>' + _esc(t.division || '—') + '</td>' +
                    '<td style="font-size:0.8rem">' + jerseyHtml + '</td>' +
                    '<td>' + _esc(t.captain) + '</td>' +
                    '<td>' + _esc(t.captainWhatsApp) + '</td>' +
                    '<td>' + linkHtml + '</td>' +
                    '<td>' + availabilityLinkHtml + '</td>' +
                    '<td>' +
                    '<button class="btn btn-sm btn-outline btn-edit" data-id="' + t.id + '">' + I18n.t('admin.edit') + '</button> ' +
                    '<button class="btn btn-sm btn-outline btn-delete" data-id="' + t.id + '">' + I18n.t('admin.delete') + '</button>' +
                    '</td>';
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.btn-copy').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var url = btn.getAttribute('data-url');
                    navigator.clipboard.writeText(url).then(function() {
                                var original = btn.textContent;
                        btn.textContent = '已複製！';
                                setTimeout(function() { btn.textContent = original; }, 2000);
                    });
                });
            });
            bindRowButtons(teams);
        }

        function _jerseyColor(color) {
            if (!color) return 'transparent';
            var map = {
                '白色': '#ffffff', '白': '#ffffff',
                '黑色': '#222222', '黑': '#222222',
                '紅色': '#e53e3e', '紅': '#e53e3e',
                '藍色': '#3182ce', '藍': '#3182ce',
                '綠色': '#38a169', '綠': '#38a169',
                '黃色': '#ecc94b', '黃': '#ecc94b',
                '橙色': '#ed8936', '橙': '#ed8936',
                '紫色': '#805ad5', '紫': '#805ad5',
                '灰色': '#a0aec0', '灰': '#a0aec0',
                '深藍': '#1a365d', '淺藍': '#63b3ed',
                '深紅': '#9b2c2c', '粉紅': '#ed64a6', '粉紅色': '#ed64a6',
                '金色': '#d69e2e', '銀色': '#cbd5e0'
            };
            return map[color] || (color.charAt(0) === '#' ? color : 'transparent');
        }

        function bindRowButtons(teams) {
            tbody.querySelectorAll('.btn-edit').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var id = btn.getAttribute('data-id');
                    var t = teams.find(function (x) { return x.id === id; });
                    if (!t) return;
                    editingId = id;
                    formTitle.textContent = I18n.t('admin.edit');
                    document.getElementById('team-name').value = t.name || '';
                    document.getElementById('team-division').value = t.division || '';
                    document.getElementById('team-logo').value = t.logo || '';
                    document.getElementById('team-captain').value = t.captain || '';
                    document.getElementById('team-whatsapp').value = t.captainWhatsApp || '';
                    document.getElementById('team-desc').value = t.description || '';
                    document.getElementById('team-jersey-home').value = t.jerseyHome || '';
                    document.getElementById('team-jersey-away').value = t.jerseyAway || '';
                    formEl.hidden = false;
                });
            });
            tbody.querySelectorAll('.btn-delete').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var id = btn.getAttribute('data-id');
                    if (!confirm('Delete this team?')) return;
                    API.post('deleteTeam', { teamId: id }).then(function () {
                        showMsg('Deleted', 'success');
                        loadTeams();
                    }).catch(function () { showMsg(I18n.t('error.submitFailed'), 'error'); });
                });
            });
        }

        seasonSelect.addEventListener('change', function () {
            createBtn.disabled = !seasonSelect.value;
            importBtn.disabled = !seasonSelect.value;
            loadTeams();
        });

        createBtn.addEventListener('click', function () { resetForm(); formEl.hidden = false; });
        document.getElementById('btn-cancel-team').addEventListener('click', resetForm);

        importBtn.addEventListener('click', function () {
            if (!seasonSelect.value) { showMsg('請先選擇目標賽季', 'error'); return; }
            importCard.hidden = false;
            importTeamsList.hidden = true;
            selectAllImportBtn.hidden = true;
            copyImportTeamsBtn.hidden = true;
            importSourceSeason.value = guessPreviousSeasonId();
        });

        cancelImportBtn.addEventListener('click', function () {
            importCard.hidden = true;
        });

        loadImportTeamsBtn.addEventListener('click', loadImportTeams);

        selectAllImportBtn.addEventListener('click', function () {
            importTeamsList.querySelectorAll('input[type="checkbox"]').forEach(function (box) { box.checked = true; });
        });

        copyImportTeamsBtn.addEventListener('click', function () {
            var teamIds = Array.from(importTeamsList.querySelectorAll('input[type="checkbox"]:checked')).map(function (box) { return box.value; });
            if (teamIds.length === 0) { showMsg('請選擇要複製的球隊', 'error'); return; }
            copyImportTeamsBtn.disabled = true;
            copyImportTeamsBtn.textContent = '複製中...';
            API.post('copyTeamsToSeason', {
                sourceSeasonId: importSourceSeason.value,
                targetSeasonId: seasonSelect.value,
                teamIds: teamIds
            }).then(function (result) {
                var skipped = result && result.skippedCount ? '，已略過 ' + result.skippedCount + ' 隊同名球隊' : '';
                showMsg('已複製 ' + ((result && result.copiedCount) || 0) + ' 隊' + skipped, 'success');
                importCard.hidden = true;
                loadTeams();
            }).catch(function (err) {
                showMsg((err && err.message) || I18n.t('error.submitFailed'), 'error');
            }).finally(function () {
                copyImportTeamsBtn.disabled = false;
                copyImportTeamsBtn.textContent = '複製已選球隊到目前賽季';
            });
        });

        function guessPreviousSeasonId() {
            var target = seasonSelect.value;
            var targetIndex = allSeasons.findIndex(function (s) { return s.id === target; });
            if (targetIndex > 0) return allSeasons[targetIndex - 1].id;
            var other = allSeasons.find(function (s) { return s.id !== target; });
            return other ? other.id : '';
        }

        function loadImportTeams() {
            var sourceId = importSourceSeason.value;
            if (!sourceId) { showMsg('請選擇來源賽季', 'error'); return; }
            if (sourceId === seasonSelect.value) { showMsg('來源賽季不可與目前賽季相同', 'error'); return; }
            importTeamsList.hidden = false;
            importTeamsList.innerHTML = '<p class="text-muted">載入中...</p>';
            selectAllImportBtn.hidden = true;
            copyImportTeamsBtn.hidden = true;
            Promise.all([API.getTeams(sourceId), API.getTeams(seasonSelect.value)]).then(function (results) {
                var sourceTeams = results[0] || [];
                var targetTeams = results[1] || [];
                var targetNames = {};
                targetTeams.forEach(function (team) { targetNames[(team.name || '').toLowerCase()] = true; });
                if (sourceTeams.length === 0) {
                    importTeamsList.innerHTML = '<p class="text-muted">來源賽季暫無球隊</p>';
                    return;
                }
                importTeamsList.innerHTML = sourceTeams.map(function (team) {
                    var exists = targetNames[(team.name || '').toLowerCase()];
                    return '<label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;opacity:' + (exists ? '0.55' : '1') + '">' +
                        '<input type="checkbox" value="' + _esc(team.id) + '" ' + (exists ? 'disabled' : 'checked') + ' style="margin-top:4px">' +
                        '<span><strong>' + _esc(team.name) + '</strong>' +
                        '<br><span class="text-muted" style="font-size:0.82rem">' + _esc(team.captain || '') + ' ' + _esc(team.captainWhatsApp || '') + (exists ? '（目標賽季已有同名球隊）' : '') + '</span></span>' +
                        '</label>';
                }).join('');
                selectAllImportBtn.hidden = false;
                copyImportTeamsBtn.hidden = false;
            }).catch(function () {
                importTeamsList.innerHTML = '<p class="text-muted">載入失敗</p>';
            });
        }

        document.getElementById('btn-save-team').addEventListener('click', function () {
            var data = {
                seasonId: seasonSelect.value,
                name: document.getElementById('team-name').value.trim(),
                division: document.getElementById('team-division').value.trim().toUpperCase(),
                logo: document.getElementById('team-logo').value.trim(),
                captain: document.getElementById('team-captain').value.trim(),
                captainWhatsApp: document.getElementById('team-whatsapp').value.trim(),
                description: document.getElementById('team-desc').value.trim(),
                jerseyHome: document.getElementById('team-jersey-home').value.trim(),
                jerseyAway: document.getElementById('team-jersey-away').value.trim()
            };
            if (!data.name) { showMsg(I18n.t('error.requiredField', { field: 'name' }), 'error'); return; }
            if (!data.seasonId) { showMsg(I18n.t('error.requiredField', { field: 'seasonId' }), 'error'); return; }

            var action = editingId ? 'updateTeam' : 'createTeam';
            if (editingId) data.teamId = editingId;

            API.post(action, data).then(function () {
                showMsg(editingId ? I18n.t('admin.updateSuccess') : I18n.t('admin.submitSuccess'), 'success');
                resetForm();
                loadTeams();
            }).catch(function () { showMsg(I18n.t('error.submitFailed'), 'error'); });
        });

        function _esc(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
        function _genToken() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        loadSeasons();
    })();
    </script>
</body>
</html>
