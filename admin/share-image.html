<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 分享圖生成">
    <meta name="theme-color" content="#1a1a2e">
    <title>分享圖生成 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.shareImage">分享圖生成</h1>

                <!-- 比賽選擇 -->
                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                        <select id="season-select" class="admin-select"></select>
                    </div>
                    <div class="admin-form-group">
                        <label for="game-select" class="admin-label" data-i18n="shareImage.selectGame">選擇比賽</label>
                        <select id="game-select" class="admin-select" disabled>
                            <option value="">--</option>
                        </select>
                    </div>
                </div>

                <!-- 模板選擇 -->
                <div class="admin-form-group">
                    <label class="admin-label" data-i18n="share.selectTemplate">選擇模板</label>
                    <div class="admin-toolbar" id="template-selector" role="radiogroup" aria-label="選擇模板">
                        <button class="btn btn-outline template-btn active" data-template="classic" role="radio" aria-checked="true">
                            <span data-i18n="share.classic">經典風格</span>
                        </button>
                        <button class="btn btn-outline template-btn" data-template="modern" role="radio" aria-checked="false">
                            <span data-i18n="share.modern">現代風格</span>
                        </button>
                        <button class="btn btn-outline template-btn" data-template="minimal" role="radio" aria-checked="false">
                            <span data-i18n="share.minimal">簡約風格</span>
                        </button>
                    </div>
                </div>

                <!-- 提示訊息 -->
                <div id="share-message" class="admin-message" role="alert" hidden></div>

                <!-- 預覽區域 -->
                <div class="admin-card" id="preview-card" hidden>
                    <h2 class="admin-card-title" data-i18n="admin.preview">預覽</h2>
                    <div id="preview-container" style="text-align:center;"></div>
                </div>

                <!-- 操作按鈕 -->
                <div class="admin-actions" id="share-actions" hidden>
                    <button id="btn-generate" class="btn btn-primary" data-i18n="shareImage.generate">生成分享圖</button>
                    <button id="btn-download-png" class="btn btn-outline" data-i18n="shareImage.downloadPng" disabled>下載 PNG</button>
                    <button id="btn-download-jpg" class="btn btn-outline" data-i18n="shareImage.downloadJpg" disabled>下載 JPEG</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script src="../js/share-image.js"></script>
    <script>
    (function () {
      'use strict';

      var seasonSelect = document.getElementById('season-select');
      var gameSelect = document.getElementById('game-select');
      var templateBtns = document.querySelectorAll('.template-btn');
      var btnGenerate = document.getElementById('btn-generate');
      var btnDownloadPng = document.getElementById('btn-download-png');
      var btnDownloadJpg = document.getElementById('btn-download-jpg');
      var previewCard = document.getElementById('preview-card');
      var shareActions = document.getElementById('share-actions');
      var messageEl = document.getElementById('share-message');

      var selectedTemplate = 'classic';
      var currentCanvas = null;
      var gamesCache = [];
      var teamsCache = {};

      // ─── 初始化 ───
      I18n.init();
      _loadSeasons();

      // ─── 事件綁定 ───
      seasonSelect.addEventListener('change', function () {
        _loadGames(seasonSelect.value);
      });

      gameSelect.addEventListener('change', function () {
        shareActions.hidden = !gameSelect.value;
        _resetPreview();
      });

      templateBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          templateBtns.forEach(function (b) {
            b.classList.remove('active');
            b.setAttribute('aria-checked', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-checked', 'true');
          selectedTemplate = btn.getAttribute('data-template');
          // 如果已有預覽，重新生成
          if (currentCanvas && gameSelect.value) {
            _generateImage();
          }
        });
      });

      btnGenerate.addEventListener('click', _generateImage);

      btnDownloadPng.addEventListener('click', function () {
        if (currentCanvas) {
          ShareImageGenerator.download(currentCanvas, 'png');
        }
      });

      btnDownloadJpg.addEventListener('click', function () {
        if (currentCanvas) {
          ShareImageGenerator.download(currentCanvas, 'jpeg');
        }
      });

      // ─── 載入賽季 ───
      function _loadSeasons() {
        API.getSeasons()
          .then(function (seasons) {
            seasonSelect.innerHTML = '<option value="">--</option>';
            if (!seasons || !seasons.length) return;
            seasons.forEach(function (s) {
              var opt = document.createElement('option');
              opt.value = s.id;
              opt.textContent = s.name;
              seasonSelect.appendChild(opt);
            });
            // 自動選擇第一個賽季
            if (seasons.length > 0) {
              seasonSelect.value = seasons[0].id;
              _loadGames(seasons[0].id);
            }
          })
          .catch(function () {
            _showMessage('error', I18n.t('error.loadFailed'));
          });
      }

      // ─── 載入比賽 ───
      function _loadGames(seasonId) {
        if (!seasonId) {
          gameSelect.innerHTML = '<option value="">--</option>';
          gameSelect.disabled = true;
          return;
        }

        // 同時載入比賽和球隊
        Promise.all([
          API.getGames(seasonId),
          API.getTeams(seasonId)
        ])
          .then(function (results) {
            var games = results[0] || [];
            var teams = results[1] || [];

            // 快取球隊資料
            teamsCache = {};
            teams.forEach(function (t) { teamsCache[t.id] = t; });

            // 只顯示已完成的比賽
            gamesCache = games.filter(function (g) {
              return g.status === 'completed';
            });

            gameSelect.innerHTML = '<option value="">--</option>';
            gamesCache.forEach(function (g) {
              var home = teamsCache[g.homeTeamId];
              var away = teamsCache[g.awayTeamId];
              var homeName = home ? home.name : g.homeTeamId;
              var awayName = away ? away.name : g.awayTeamId;
              var opt = document.createElement('option');
              opt.value = g.id;
              opt.textContent = g.date + ' | ' + homeName + ' ' + (g.homeScore || 0) + ' - ' + (g.awayScore || 0) + ' ' + awayName;
              gameSelect.appendChild(opt);
            });
            gameSelect.disabled = false;
            shareActions.hidden = true;
            _resetPreview();
          })
          .catch(function () {
            _showMessage('error', I18n.t('error.loadFailed'));
          });
      }

      // ─── 生成圖片 ───
      function _generateImage() {
        var gameId = gameSelect.value;
        if (!gameId) {
          _showMessage('error', I18n.t('admin.noGameSelected'));
          return;
        }

        var game = gamesCache.find(function (g) { return g.id === gameId; });
        if (!game) return;

        _showMessage('info', I18n.t('share.generating'));
        btnGenerate.disabled = true;

        // 取得 Box Score 以找 MVP 數據
        API.getBoxScore(gameId)
          .then(function (boxData) {
            var home = teamsCache[game.homeTeamId] || {};
            var away = teamsCache[game.awayTeamId] || {};

            // 找出 MVP（得分最高的球員）
            var mvp = _findMVP(boxData, game);

            var gameData = {
              date: game.date || '',
              homeTeamName: home.name || 'Home',
              awayTeamName: away.name || 'Away',
              homeTeamLogo: home.logo || '',
              awayTeamLogo: away.logo || '',
              homeScore: game.homeScore || 0,
              awayScore: game.awayScore || 0,
              mvpName: mvp ? mvp.name : '',
              mvpPts: mvp ? mvp.pts : null,
              mvpReb: mvp ? mvp.reb : null,
              mvpAst: mvp ? mvp.ast : null
            };

            return ShareImageGenerator.generate(gameData, selectedTemplate);
          })
          .then(function (canvas) {
            currentCanvas = canvas;
            ShareImageGenerator.preview(canvas, 'preview-container');
            previewCard.hidden = false;
            btnDownloadPng.disabled = false;
            btnDownloadJpg.disabled = false;
            _hideMessage();
          })
          .catch(function (err) {
            _showMessage('error', err.message || I18n.t('error.loadFailed'));
          })
          .finally(function () {
            btnGenerate.disabled = false;
          });
      }

      // ─── 找出 MVP ───
      function _findMVP(boxData, game) {
        if (!boxData) return null;

        // 如果比賽有指定 MVP
        if (game.mvpPlayerId) {
          var allStats = (boxData.homeStats || []).concat(boxData.awayStats || []);
          var mvpEntry = allStats.find(function (s) { return s.playerId === game.mvpPlayerId; });
          if (mvpEntry) {
            return {
              name: mvpEntry.playerName || mvpEntry.playerId,
              pts: mvpEntry.pts,
              reb: mvpEntry.reb,
              ast: mvpEntry.ast
            };
          }
        }

        // 否則取得分最高的球員
        var allPlayers = (boxData.homeStats || []).concat(boxData.awayStats || []);
        if (allPlayers.length === 0) return null;

        var topScorer = allPlayers.reduce(function (best, p) {
          return (p.pts || 0) > (best.pts || 0) ? p : best;
        }, allPlayers[0]);

        return {
          name: topScorer.playerName || topScorer.playerId || 'MVP',
          pts: topScorer.pts,
          reb: topScorer.reb,
          ast: topScorer.ast
        };
      }

      // ─── 重置預覽 ───
      function _resetPreview() {
        currentCanvas = null;
        previewCard.hidden = true;
        btnDownloadPng.disabled = true;
        btnDownloadJpg.disabled = true;
        document.getElementById('preview-container').innerHTML = '';
      }

      // ─── 訊息顯示 ───
      function _showMessage(type, text) {
        messageEl.hidden = false;
        messageEl.className = 'admin-message admin-message--' + type;
        messageEl.textContent = text;
      }

      function _hideMessage() {
        messageEl.hidden = true;
      }
    })();
    </script>
</body>
</html>
