<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - Box Score 輸入">
    <meta name="theme-color" content="#1a1a2e">
    <title>Box Score 輸入 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css?v=20260506b">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.boxScore">Box Score 輸入</h1>

                <!-- 比賽選擇 -->
                <div class="admin-form-group">
                    <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                    <select id="season-select" class="admin-select"></select>
                </div>
                <div class="admin-form-group">
                    <label for="game-select" class="admin-label" data-i18n="admin.selectGame">選擇比賽</label>
                    <select id="game-select" class="admin-select" disabled>
                        <option value="">--</option>
                    </select>
                </div>

                <!-- 提示訊息 -->
                <div id="boxscore-message" class="admin-message" role="alert" hidden></div>

                <!-- 出席球員選擇 -->
                <div id="attendance-section" class="admin-form-group" hidden>
                    <h3 class="admin-subtitle">出席球員</h3>
                    <div id="attendance-home" class="admin-attendance-group"></div>
                    <div id="attendance-away" class="admin-attendance-group"></div>
                    <button id="btn-confirm-attendance" class="btn btn-primary" style="margin-top:var(--spacing-sm)">確認出席名單</button>
                </div>

                <!-- 節分輸入 (Q1-Q4) -->
                <div id="quarter-scores-section" class="admin-form-group" hidden>
                    <h3 class="admin-subtitle">節分</h3>
                    <div class="admin-quarter-grid">
                        <div class="admin-quarter-row admin-quarter-header-row">
                            <span class="admin-quarter-team"></span>
                            <span class="admin-quarter-col-label">Q1</span>
                            <span class="admin-quarter-col-label">Q2</span>
                            <span class="admin-quarter-col-label">Q3</span>
                            <span class="admin-quarter-col-label">Q4</span>
                            <span class="admin-quarter-col-label admin-quarter-total-label">Total</span>
                        </div>
                        <div class="admin-quarter-row">
                            <span id="qs-home-label" class="admin-quarter-team">主隊</span>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-homeQ1" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-homeQ2" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-homeQ3" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-homeQ4" class="admin-stat-input" placeholder="0">
                            <input type="text" id="qs-homeTotal" class="admin-stat-input admin-stat-input--total" placeholder="0" readonly tabindex="-1">
                        </div>
                        <div class="admin-quarter-row">
                            <span id="qs-away-label" class="admin-quarter-team">客隊</span>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-awayQ1" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-awayQ2" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-awayQ3" class="admin-stat-input" placeholder="0">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="qs-awayQ4" class="admin-stat-input" placeholder="0">
                            <input type="text" id="qs-awayTotal" class="admin-stat-input admin-stat-input--total" placeholder="0" readonly tabindex="-1">
                        </div>
                    </div>
                </div>

                <!-- Game MVP 選擇 -->
                <div id="mvp-section" class="admin-form-group" hidden>
                    <div class="admin-mvp-card">
                        <h3 class="admin-subtitle">🏆 Game MVP</h3>
                        <p class="admin-mvp-note">請選擇本場 MVP，將同步顯示在比賽詳情頁並可直接連到球員檔案。</p>
                        <label for="mvp-select" class="admin-label">MVP 球員</label>
                        <select id="mvp-select" class="admin-select">
                            <option value="">-- 選擇 MVP --</option>
                        </select>
                        <div id="mvp-profile-box" class="admin-mvp-profile" hidden>
                            <a id="mvp-profile-link" href="#" target="_blank" rel="noopener">查看球員檔案</a>
                        </div>
                    </div>
                </div>

                <!-- 手機滑動提示 -->
                <div id="swipe-hint" class="admin-swipe-hint" hidden>
                    <span data-i18n="admin.swipeHint">← 左右滑動切換球員 →</span>
                    <span id="player-indicator" class="admin-player-indicator"></span>
                </div>

                <!-- Box Score 表格 (桌面) -->
                <div id="boxscore-desktop" class="table-wrapper admin-boxscore-table" hidden>
                    <table class="data-table" id="boxscore-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.player">球員</th>
                                <th data-i18n="table.fouls">犯規</th>
                                <th data-i18n="table.pts">得分</th>
                                <th data-i18n="table.fgm">FGM</th>
                                <th data-i18n="table.fga">FGA</th>
                                <th data-i18n="table.tpm">3PM</th>
                                <th data-i18n="table.tpa">3PA</th>
                                <th data-i18n="table.ftm">FTM</th>
                                <th data-i18n="table.fta">FTA</th>
                                <th>OREB</th>
                                <th>DREB</th>
                                <th data-i18n="table.ast">助攻</th>
                                <th data-i18n="table.stl">抄截</th>
                                <th data-i18n="table.blk">封阻</th>
                                <th data-i18n="table.to">TO</th>
                                <th class="admin-op-col">操作</th>
                            </tr>
                        </thead>
                        <tbody id="boxscore-body"></tbody>
                    </table>
                </div>

                <!-- Box Score 卡片 (手機) -->
                <div id="boxscore-mobile" class="admin-boxscore-mobile" hidden></div>

                <!-- 球員名單管理 -->
                <div id="player-mgmt-section" class="admin-form-group" hidden>
                    <h3 class="admin-subtitle">球員名單管理</h3>
                    <div class="admin-player-mgmt-row">
                        <select id="add-player-select" class="admin-select admin-select--inline">
                            <option value="">-- 從名單加入球員 --</option>
                        </select>
                        <button id="btn-add-roster-player" class="btn btn-outline btn-sm">＋ 加入</button>
                    </div>
                    <details class="admin-guest-player-form">
                        <summary class="admin-guest-summary">＋ 加入臨時球員（非名單）</summary>
                        <div class="admin-player-add-guest">
                            <select id="guest-side" class="admin-select admin-select--inline">
                                <option value="home">主隊</option>
                                <option value="away">客隊</option>
                            </select>
                            <input type="text" id="guest-number" class="admin-input admin-input--sm" placeholder="#號碼" maxlength="3">
                            <input type="text" id="guest-name" class="admin-input admin-input--sm" placeholder="球員名稱">
                            <button id="btn-add-guest-player" class="btn btn-outline btn-sm">加入</button>
                        </div>
                    </details>
                </div>

                <!-- 提交按鈕 -->
                <div id="boxscore-actions" class="admin-actions" hidden>
                    <button id="btn-submit-boxscore" class="btn btn-primary" data-i18n="admin.submitBoxScore">提交 Box Score</button>
                    <button id="btn-update-boxscore" class="btn btn-outline" data-i18n="admin.updateBoxScore" hidden>更新 Box Score</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script src="boxscore.js?v=20260506b"></script>
    <script>I18n.init();</script>
</body>
</html>
