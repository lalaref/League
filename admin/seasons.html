<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 賽季管理">
    <meta name="theme-color" content="#1a1a2e">
    <title>賽季管理 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.seasonManage">賽季管理</h1>
                <div id="season-message" class="admin-message" role="alert" hidden></div>

                <!-- 建立賽季按鈕 -->
                <div class="admin-toolbar">
                    <button id="btn-create-season" class="btn btn-primary" data-i18n="admin.createSeason">建立賽季</button>
                </div>

                <!-- 賽季表單 -->
                <div id="season-form" class="admin-card" hidden>
                    <h2 id="season-form-title" class="admin-card-title" data-i18n="admin.createSeason">建立賽季</h2>
                    <div class="admin-form-group">
                        <label for="season-name" class="admin-label" data-i18n="admin.seasonName">賽季名稱</label>
                        <input type="text" id="season-name" class="admin-input" required>
                    </div>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="season-start" class="admin-label" data-i18n="admin.startDate">開始日期</label>
                            <input type="date" id="season-start" class="admin-input" required>
                        </div>
                        <div class="admin-form-group">
                            <label for="season-end" class="admin-label" data-i18n="admin.endDate">結束日期</label>
                            <input type="date" id="season-end" class="admin-input" required>
                        </div>
                    </div>
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="season-playoff-topn" class="admin-label" data-i18n="admin.playoffTopN">季後賽名額</label>
                            <input type="number" id="season-playoff-topn" class="admin-input" value="8" min="2">
                        </div>
                        <div class="admin-form-group">
                            <label for="season-min-games" class="admin-label" data-i18n="admin.minGames">最低出場次數</label>
                            <input type="number" id="season-min-games" class="admin-input" value="3" min="1">
                        </div>
                    </div>
                    <div class="admin-form-group">
                        <label for="season-status" class="admin-label" data-i18n="admin.status">狀態</label>
                        <select id="season-status" class="admin-select">
                            <option value="active" data-i18n="admin.active">進行中</option>
                            <option value="completed" data-i18n="admin.completed">已完成</option>
                        </select>
                    </div>
                    <div class="admin-actions">
                        <button id="btn-save-season" class="btn btn-primary" data-i18n="admin.save">儲存</button>
                        <button id="btn-cancel-season" class="btn btn-outline" data-i18n="admin.cancel">取消</button>
                    </div>
                </div>

                <!-- 賽季列表 -->
                <div class="table-wrapper">
                    <table class="data-table" id="seasons-table">
                        <thead>
                            <tr>
                                <th data-i18n="admin.seasonName">賽季名稱</th>
                                <th data-i18n="admin.startDate">開始日期</th>
                                <th data-i18n="admin.endDate">結束日期</th>
                                <th data-i18n="admin.playoffTopN">季後賽名額</th>
                                <th data-i18n="admin.minGames">最低出場</th>
                                <th data-i18n="admin.status">狀態</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="seasons-body">
                            <tr><td colspan="7" class="text-muted" data-i18n="common.loading">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script>
    I18n.init();

    (function () {
        var editingId = null;
        var msgEl = document.getElementById('season-message');
        var formEl = document.getElementById('season-form');
        var formTitle = document.getElementById('season-form-title');
        var tbody = document.getElementById('seasons-body');

        // Strip ISO to YYYY-MM-DD for date inputs
        function _toDateInput(raw) {
            if (!raw) return '';
            var s = String(raw);
            if (s.indexOf('T') !== -1) return s.split('T')[0];
            return s;
        }

        function showMsg(text, type) {
            msgEl.textContent = text;
            msgEl.className = 'admin-message admin-message--' + type;
            msgEl.hidden = false;
            setTimeout(function () { msgEl.hidden = true; }, 4000);
        }

        function resetForm() {
            editingId = null;
            formTitle.setAttribute('data-i18n', 'admin.createSeason');
            formTitle.textContent = I18n.t('admin.createSeason');
            document.getElementById('season-name').value = '';
            document.getElementById('season-start').value = '';
            document.getElementById('season-end').value = '';
            document.getElementById('season-playoff-topn').value = '8';
            document.getElementById('season-min-games').value = '3';
            document.getElementById('season-status').value = 'active';
            formEl.hidden = true;
        }

        function loadSeasons() {
            API.getSeasons().then(function (seasons) {
                tbody.innerHTML = '';
                if (!seasons || seasons.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-muted">' + I18n.t('common.noData') + '</td></tr>';
                    return;
                }
                seasons.forEach(function (s) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td>' + _esc(s.name) + '</td>' +
                        '<td>' + _esc(Utils.formatDateWithDay(s.startDate)) + '</td>' +
                        '<td>' + _esc(Utils.formatDateWithDay(s.endDate)) + '</td>' +
                        '<td>' + (s.playoffTopN || 8) + '</td>' +
                        '<td>' + (s.minGamesForRanking || 3) + '</td>' +
                        '<td>' + _esc(s.status) + '</td>' +
                        '<td>' +
                        '<button class="btn btn-sm btn-outline btn-edit" data-id="' + s.id + '">' + I18n.t('admin.edit') + '</button> ' +
                        '<button class="btn btn-sm btn-outline btn-delete" data-id="' + s.id + '">' + I18n.t('admin.delete') + '</button>' +
                        '</td>';
                    tbody.appendChild(tr);
                });
                bindRowButtons(seasons);
            }).catch(function () {
                tbody.innerHTML = '<tr><td colspan="7" class="text-muted">' + I18n.t('error.loadFailed') + '</td></tr>';
            });
        }

        function bindRowButtons(seasons) {
            var editBtns = tbody.querySelectorAll('.btn-edit');
            var delBtns = tbody.querySelectorAll('.btn-delete');
            editBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var id = btn.getAttribute('data-id');
                    var s = seasons.find(function (x) { return x.id === id; });
                    if (!s) return;
                    editingId = id;
                    formTitle.textContent = I18n.t('admin.edit');
                    document.getElementById('season-name').value = s.name || '';
                    document.getElementById('season-start').value = _toDateInput(s.startDate);
                    document.getElementById('season-end').value = _toDateInput(s.endDate);
                    document.getElementById('season-playoff-topn').value = s.playoffTopN || 8;
                    document.getElementById('season-min-games').value = s.minGamesForRanking || 3;
                    document.getElementById('season-status').value = s.status || 'active';
                    formEl.hidden = false;
                });
            });
            delBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var id = btn.getAttribute('data-id');
                    if (!confirm('Delete this season?')) return;
                    API.post('deleteSeason', { seasonId: id }).then(function () {
                        showMsg('Deleted', 'success');
                        loadSeasons();
                    }).catch(function () { showMsg(I18n.t('error.submitFailed'), 'error'); });
                });
            });
        }

        document.getElementById('btn-create-season').addEventListener('click', function () {
            resetForm();
            formEl.hidden = false;
        });

        document.getElementById('btn-cancel-season').addEventListener('click', resetForm);

        document.getElementById('btn-save-season').addEventListener('click', function () {
            var data = {
                name: document.getElementById('season-name').value.trim(),
                startDate: document.getElementById('season-start').value,
                endDate: document.getElementById('season-end').value,
                playoffTopN: parseInt(document.getElementById('season-playoff-topn').value, 10) || 8,
                minGamesForRanking: parseInt(document.getElementById('season-min-games').value, 10) || 3,
                status: document.getElementById('season-status').value
            };
            if (!data.name) { showMsg(I18n.t('error.requiredField', { field: 'name' }), 'error'); return; }

            var action = editingId ? 'updateSeason' : 'createSeason';
            if (editingId) data.seasonId = editingId;

            API.post(action, data).then(function () {
                showMsg(editingId ? I18n.t('admin.updateSuccess') : I18n.t('admin.submitSuccess'), 'success');
                resetForm();
                loadSeasons();
            }).catch(function () { showMsg(I18n.t('error.submitFailed'), 'error'); });
        });

        function _esc(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

        loadSeasons();
    })();
    </script>
</body>
</html>
