<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 投籃位置記錄">
    <meta name="theme-color" content="#1a1a2e">
    <title>投籃位置記錄 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="../index.html" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="../index.html" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="../schedule.html" class="nav-link" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="../team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="../player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="../standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="../archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                    <li role="none"><a href="index.html" class="nav-link active" role="menuitem" data-i18n="nav.admin">管理後台</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container">
                <h1 class="section-title" data-i18n="admin.shotChart">投籃位置記錄</h1>

                <!-- 選擇比賽及球員 -->
                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label for="season-select" class="admin-label" data-i18n="admin.selectSeason">選擇賽季</label>
                        <select id="season-select" class="admin-select"></select>
                    </div>
                    <div class="admin-form-group">
                        <label for="game-select" class="admin-label" data-i18n="admin.selectGame">選擇比賽</label>
                        <select id="game-select" class="admin-select" disabled></select>
                    </div>
                    <div class="admin-form-group">
                        <label for="player-select" class="admin-label" data-i18n="admin.selectPlayer">選擇球員</label>
                        <select id="player-select" class="admin-select" disabled></select>
                    </div>
                </div>

                <div id="shotchart-message" class="admin-message" role="alert" hidden></div>

                <!-- 投籃結果選擇 -->
                <div id="shot-result-toggle" class="admin-shot-toggle" hidden>
                    <button id="btn-shot-made" class="btn btn-primary admin-shot-btn active" data-i18n="admin.shotMade">命中</button>
                    <button id="btn-shot-missed" class="btn btn-outline admin-shot-btn" data-i18n="admin.shotMissed">不中</button>
                </div>

                <p id="tap-hint" class="admin-tap-hint" data-i18n="admin.tapToRecord" hidden>點擊球場標記投籃位置</p>

                <!-- 半場籃球場 -->
                <div id="court-container" class="admin-court-container" hidden>
                    <svg id="court-svg" class="admin-court-svg" viewBox="0 0 500 470" xmlns="http://www.w3.org/2000/svg">
                        <!-- 球場底圖 -->
                        <rect x="0" y="0" width="500" height="470" fill="#2a2a4a" rx="8"/>
                        <!-- 底線 -->
                        <line x1="50" y1="450" x2="450" y2="450" stroke="#555" stroke-width="2"/>
                        <!-- 邊線 -->
                        <line x1="50" y1="0" x2="50" y2="450" stroke="#555" stroke-width="2"/>
                        <line x1="450" y1="0" x2="450" y2="450" stroke="#555" stroke-width="2"/>
                        <!-- 中線 -->
                        <line x1="50" y1="0" x2="450" y2="0" stroke="#555" stroke-width="2"/>
                        <!-- 禁區 (paint) -->
                        <rect x="170" y="330" width="160" height="120" fill="none" stroke="#888" stroke-width="2"/>
                        <!-- 罰球圈 -->
                        <circle cx="250" cy="330" r="60" fill="none" stroke="#888" stroke-width="2"/>
                        <!-- 籃框 -->
                        <circle cx="250" cy="420" r="8" fill="none" stroke="#e94560" stroke-width="2"/>
                        <!-- 籃板 -->
                        <line x1="220" y1="435" x2="280" y2="435" stroke="#e94560" stroke-width="3"/>
                        <!-- 三分線 -->
                        <path d="M 80 450 L 80 280 Q 80 100 250 100 Q 420 100 420 280 L 420 450" fill="none" stroke="#888" stroke-width="2"/>
                    </svg>
                    <!-- Shot markers rendered here -->
                    <div id="shot-markers" class="admin-shot-markers"></div>
                </div>

                <!-- 統計摘要 -->
                <div id="shot-stats" class="admin-shot-stats" hidden>
                    <div class="admin-shot-stat">
                        <span class="admin-shot-stat-label" data-i18n="admin.totalShots">總投籃</span>
                        <span id="stat-total" class="admin-shot-stat-value">0</span>
                    </div>
                    <div class="admin-shot-stat">
                        <span class="admin-shot-stat-label" data-i18n="admin.madeShots">命中</span>
                        <span id="stat-made" class="admin-shot-stat-value text-success">0</span>
                    </div>
                    <div class="admin-shot-stat">
                        <span class="admin-shot-stat-label" data-i18n="admin.missedShots">不中</span>
                        <span id="stat-missed" class="admin-shot-stat-value text-error">0</span>
                    </div>
                    <div class="admin-shot-stat">
                        <span class="admin-shot-stat-label" data-i18n="admin.shotPct">命中率</span>
                        <span id="stat-pct" class="admin-shot-stat-value text-accent">0%</span>
                    </div>
                </div>

                <!-- 操作按鈕 -->
                <div id="shot-actions" class="admin-actions" hidden>
                    <button id="btn-undo" class="btn btn-outline" data-i18n="admin.undoLast">撤銷上一筆</button>
                    <button id="btn-clear" class="btn btn-outline" data-i18n="admin.clearAll">清除全部</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>document.getElementById('current-year').textContent = new Date().getFullYear();</script>
    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script src="shotchart.js"></script>
    <script>I18n.init();</script>
</body>
</html>
