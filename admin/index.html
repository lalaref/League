    <script>

    <script src="../js/utils.js?v=20260409"></script>
    <script src="../js/api.js?v=20260409"></script>
    <script src="../js/i18n.js?v=20260409"></script>
    <script src="../js/navigation.js?v=20260409"></script>
    <script src="auth.js?v=20260410"></script>
    <script>
        I18n.init();

        // 載入最近提交的比賽
        (function () {
            var container = document.getElementById('recent-submissions');
            if (!container) return;

            API.getGames()
                .then(function (games) {
                    var completed = (games || []).filter(function (g) {
                        return g.status === 'completed';
                    });
                    // 按日期降序排列，取最近 10 場
                    completed.sort(function (a, b) {
                        return (b.date || '').localeCompare(a.date || '');
                    });
                    var recent = completed.slice(0, 10);

                    container.innerHTML = '';

                    if (recent.length === 0) {
                        container.innerHTML = '<p class="text-muted">' +
                            (typeof I18n !== 'undefined' ? I18n.t('common.noData') : '暫無數據') + '</p>';
                        return;
                    }

                    recent.forEach(function (g) {
                        var card = document.createElement('div');
                        card.className = 'game-card';
                        var home = g.homeTeamName || g.homeTeamId || '—';
                        var away = g.awayTeamName || g.awayTeamId || '—';
                        var score = (g.homeScore != null ? g.homeScore : '?') + ' - ' + (g.awayScore != null ? g.awayScore : '?');
                        card.innerHTML =
                            '<a href="../game.html?id=' + encodeURIComponent(g.id) + '">' +
                            '<div class="game-card-date text-muted">' + (g.date || '') + '</div>' +
                            '<div class="game-card-matchup">' +
                            '<span class="game-card-team">' + _esc(home) + '</span>' +
                            '<span class="game-card-score">' + _esc(score) + '</span>' +
                            '<span class="game-card-team">' + _esc(away) + '</span>' +
                            '</div>' +
                            '</a>';
                        container.appendChild(card);
                    });
                })
                .catch(function () {
                    container.innerHTML = '<p class="text-muted">' +
                        (typeof I18n !== 'undefined' ? I18n.t('error.loadFailed') : '載入失敗，請重試') + '</p>';
                });

            function _esc(str) {
                var d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }
        })();
    </script>
