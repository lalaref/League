<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALL-IN Basketball League - 賽程表及季後賽對陣">
    <meta name="theme-color" content="#1a1a2e">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-S64W9C7CYZ"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-S64W9C7CYZ');
        </script>
    <title>賽程表 — ALL-IN Basketball League</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- 導航列 -->
    <header class="site-header">
        <nav class="main-nav" aria-label="主導航">
            <div class="nav-container">
                <a href="/" class="nav-logo" aria-label="ALL-IN Basketball League 首頁">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="logo-img">
                    <span class="logo-text">ALL-IN</span>
                </a>
                <button class="hamburger-btn" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
                <ul id="nav-menu" class="nav-links" role="menubar">
                    <li role="none"><a href="/" class="nav-link" role="menuitem" data-i18n="nav.home">首頁</a></li>
                    <li role="none"><a href="schedule.html" class="nav-link active" role="menuitem" data-i18n="nav.schedule">賽程</a></li>
                    <li role="none"><a href="team.html" class="nav-link" role="menuitem" data-i18n="nav.teams">球隊</a></li>
                    <li role="none"><a href="player.html" class="nav-link" role="menuitem" data-i18n="nav.players">球員</a></li>
                    <li role="none"><a href="standings.html" class="nav-link" role="menuitem" data-i18n="nav.standings">排行榜</a></li>
                    <li role="none"><a href="rules.html" class="nav-link" role="menuitem">比賽章程</a></li>
                    <li role="none"><a href="archive.html" class="nav-link" role="menuitem" data-i18n="nav.archive">歷史檔案</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="lang-switch-btn" aria-label="切換語言" data-i18n-attr="aria-label:nav.langSwitch">
                        <span data-i18n="nav.lang">EN</span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主要內容區域 -->
    <main class="main-content">
        <!-- 頁面標題及賽季選擇 -->
        <section class="section hero-section" aria-label="賽程表標題">
            <div class="container">
                <h1 class="hero-title" data-i18n="schedule.title">賽程表</h1>
                <div class="standings-controls">
                    <label for="season-select" class="sr-only" data-i18n="standings.selectSeason">選擇賽季</label>
                    <select id="season-select" class="h2h-select" aria-label="選擇賽季" data-i18n-attr="aria-label:standings.selectSeason">
                        <option value="" data-i18n="common.loading">載入中...</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- 分頁導航 -->
        <section class="section schedule-tabs-section">
            <div class="container">
                <div class="tabs" role="tablist" aria-label="賽程類別">
                    <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="tab-schedule" id="tab-btn-schedule" data-tab="schedule" data-i18n="schedule.scheduleTab">賽程</button>
                    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-playoffs" id="tab-btn-playoffs" data-tab="playoffs" data-i18n="schedule.playoffs">季後賽</button>
                </div>

                <!-- 賽程列表分頁 -->
                <div class="tab-panel active" role="tabpanel" id="tab-schedule" aria-labelledby="tab-btn-schedule">
                    <div id="schedule-loading" class="loading" data-i18n="common.loading">載入中...</div>
                    <div id="schedule-empty" class="text-center text-muted" style="display:none; padding: var(--spacing-2xl);" data-i18n="common.noData">暫無數據</div>
                    <div id="schedule-list" style="display:none;">
                        <div class="table-wrapper">
                            <table class="data-table" aria-label="賽程表">
                                <thead>
                                    <tr>
                                        <th data-i18n="table.date">日期</th>
                                        <th data-i18n="table.time">時間</th>
                                        <th data-i18n="table.venue">場地</th>
                                        <th data-i18n="schedule.matchup">對陣</th>
                                        <th data-i18n="table.result">結果</th>
                                    </tr>
                                </thead>
                                <tbody id="schedule-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 季後賽對陣分頁 -->
                <div class="tab-panel" role="tabpanel" id="tab-playoffs" aria-labelledby="tab-btn-playoffs">
                    <div id="playoffs-loading" class="loading" data-i18n="common.loading">載入中...</div>
                    <div id="playoffs-empty" class="text-center text-muted" style="display:none; padding: var(--spacing-2xl);" data-i18n="schedule.noPlayoffs">尚無季後賽數據</div>
                    <div id="playoffs-bracket-wrapper" class="playoff-bracket-wrapper" style="display:none;">
                        <div id="playoffs-bracket" class="playoff-bracket" role="img" aria-label="季後賽對陣表"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="images/logo.svg" alt="ALL-IN Basketball League" class="footer-logo">
                    <p class="footer-tagline" data-i18n="footer.tagline">全力以赴</p>
                </div>
                <div class="footer-links">
                    <a href="/" data-i18n="nav.home">首頁</a>
                    <a href="schedule.html" data-i18n="nav.schedule">賽程</a>
                    <a href="team.html" data-i18n="nav.teams">球隊</a>
                    <a href="standings.html" data-i18n="nav.standings">排行榜</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year"></span> ALL-IN Basketball League. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
    <script src="js/utils.js?v=20260409"></script>
    <script src="js/api.js?v=20260409"></script>
    <script src="js/i18n.js?v=20260409"></script>
    <script src="js/navigation.js?v=20260409"></script>
    <script src="js/schedule.js?v=20260506b"></script>
    <script>
        I18n.init();
    </script>
