<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Check — ALL-IN Basketball League</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; padding: 20px 12px; }

    h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }

    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    select { background: #1e1e30; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; max-width: 100%; }
    select:focus { outline: none; border-color: #f97316; }

    .status-bar { font-size: 12px; color: #888; }

    /* Summary chips */
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .chip-ok   { background: #14532d; color: #4ade80; border: 1px solid #166534; }
    .chip-warn { background: #7c2d12; color: #fb923c; border: 1px solid #9a3412; }

    /* Team availability */
    .availability-section { margin: 18px 0 24px; }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .section-head h2 { font-size: 14px; color: #c4b5fd; }
    .section-note { color: #888; font-size: 12px; }
    .availability-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
    .availability-day { background: #131322; border: 1px solid #2a2a3a; border-radius: 8px; min-height: 92px; padding: 9px; }
    .availability-date { color: #e0e0ff; font-size: 12px; font-weight: 700; margin-bottom: 7px; }
    .availability-empty { color: #4ade80; font-size: 11px; }
    .availability-team { display: inline-flex; align-items: center; max-width: 100%; padding: 3px 7px; border-radius: 5px; background: #3b1515; color: #fca5a5; border: 1px solid #7f1d1d; font-size: 11px; margin: 2px 2px 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .availability-note { display: block; color: #fb923c; font-size: 10px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Matrix table */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #2a2a3a; display: block; max-width: 100%; }
    table { width: auto; border-collapse: collapse; min-width: 0; }
    thead th { background: #1a1a2e; padding: 8px 10px; font-size: 11px; font-weight: 700; text-align: center; color: #a0a0c0; border-bottom: 1px solid #2a2a3a; white-space: nowrap; }
    thead th:first-child { text-align: left; min-width: 100px; }
    tbody tr:nth-child(odd)  { background: #131322; }
    tbody tr:nth-child(even) { background: #0f0f1c; }
    tbody tr:hover { background: #1e1e35; }
    td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid #1e1e2e; text-align: center; }
    td:first-child { text-align: left; font-weight: 600; color: #e0e0ff; white-space: nowrap; }

    /* Opponent cell */
    .opp { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #1e2a3a; color: #93c5fd; font-size: 11px; white-space: nowrap; }
    .opp.dup { background: #3b1515; color: #f87171; border: 1px solid #7f1d1d; }
    .cell-empty { color: #444; font-size: 11px; }

    /* Total column */
    .total { font-weight: 700; }
    .total.ok   { color: #4ade80; }
    .total.bad  { color: #f87171; }

    /* Issues list */
    .issues { margin-top: 20px; }
    .issues h2 { font-size: 14px; color: #fb923c; margin-bottom: 10px; }
    .issue-item { background: #1c1010; border-left: 3px solid #f87171; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; border-radius: 0 6px 6px 0; }
    .no-issues { background: #0d1f12; border-left: 3px solid #4ade80; padding: 8px 12px; font-size: 12px; border-radius: 0 6px 6px 0; color: #4ade80; }

    .loading-msg { color: #888; font-size: 14px; padding: 40px 0; text-align: center; }

    a.back { display: inline-block; margin-bottom: 16px; font-size: 13px; color: #888; text-decoration: none; }
    a.back:hover { color: #f97316; }

    /* Not-yet-played table */
    .nyp-section { margin-top: 24px; }
    .nyp-section h2 { font-size: 14px; color: #93c5fd; margin-bottom: 10px; }
    .nyp-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #2a2a3a; display: block; max-width: 100%; }
    .nyp-table { width: auto; border-collapse: collapse; min-width: 0; }
    .nyp-table thead th { background: #1a1a2e; padding: 8px 10px; font-size: 11px; font-weight: 700; text-align: left; color: #a0a0c0; border-bottom: 1px solid #2a2a3a; white-space: nowrap; }
    .nyp-table thead th:last-child { text-align: center; min-width: 56px; }
    .nyp-table tbody tr:nth-child(odd)  { background: #131322; }
    .nyp-table tbody tr:nth-child(even) { background: #0f0f1c; }
    .nyp-table tbody tr:hover { background: #1e1e35; }
    .nyp-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid #1e1e2e; vertical-align: middle; }
    .nyp-table td:first-child { font-weight: 600; color: #e0e0ff; white-space: nowrap; min-width: 100px; }
    .nyp-table td:last-child { text-align: center; }
    .nyp-opp { display: inline-block; padding: 2px 7px; border-radius: 4px; background: #1e2233; color: #fbbf24; font-size: 11px; margin: 2px 2px; white-space: nowrap; border: 1px solid #3b3020; }
    .nyp-none { color: #4ade80; font-size: 12px; font-style: italic; }
    .nyp-count { font-weight: 700; }
    .nyp-count.zero { color: #4ade80; }
    .nyp-count.some { color: #fbbf24; }

    @media (max-width: 480px) {
      body { padding: 14px 8px; }
      h1 { font-size: 17px; }
      select { font-size: 13px; width: 100%; }
      thead th, td { padding: 6px 8px; font-size: 11px; }
      .nyp-table thead th, .nyp-table td { padding: 6px 8px; font-size: 11px; }
      thead th:first-child { min-width: 80px; }
      .nyp-table td:first-child { min-width: 80px; }
      .opp, .nyp-opp { font-size: 10px; padding: 2px 5px; }
      .availability-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .availability-day { min-height: 82px; padding: 7px; }
    }
  </style>
</head>
<body>

<a class="back" href="schedule.html">← Back to Schedule</a>

<h1>Schedule Integrity Check</h1>
<p class="subtitle">Verifies each team plays 7 games with no repeated opponents across all rounds.</p>

<div class="controls">
  <select id="season-select"><option value="">Loading…</option></select>
  <span class="status-bar" id="status-bar"></span>
</div>

<div class="chips" id="chips" style="display:none"></div>

<div class="availability-section" id="availability-section" style="display:none">
  <div class="section-head">
    <h2>Team Unavailable Dates</h2>
    <span class="section-note" id="availability-note">Next 14 days</span>
  </div>
  <div class="availability-grid" id="availability-grid"></div>
</div>

<div class="nyp-section" id="nyp-section" style="display:none">
  <h2>Unplayed Opponents per Team</h2>
  <div class="nyp-table-wrap">
    <table class="nyp-table" id="nyp-table">
      <thead>
        <tr>
          <th>Team</th>
          <th>Hasn't Played Against</th>
          <th>Remaining</th>
        </tr>
      </thead>
      <tbody id="nyp-body"></tbody>
    </table>
  </div>
</div>

<div class="table-wrap" id="table-wrap" style="display:none">
  <table id="matrix-table">
    <thead id="matrix-head"></thead>
    <tbody id="matrix-body"></tbody>
  </table>
</div>
<div class="issues" id="issues-section" style="display:none">
  <h2>Issues Found</h2>
  <div id="issues-list"></div>
</div>

<div class="loading-msg" id="loading-msg">Loading…</div>

<script>
var BASE_URL = 'https://script.google.com/macros/s/AKfycbzQkJC-1ZIAnsbXyC0M6_Hwh53pvKMuZ38j_eCIVCN4Pm-XwQ-0HguJR20RjGIRl_4P/exec';

function apiFetch(action, params) {
  var qs = 'action=' + encodeURIComponent(action);
  if (params) Object.keys(params).forEach(function(k) { qs += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); });
  qs += '&_t=' + Date.now();
  return fetch(BASE_URL + '?' + qs, { method: 'GET', redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(function(j) { return j.data !== undefined ? j.data : j; });
}

var seasonSelect = document.getElementById('season-select');
var statusBar    = document.getElementById('status-bar');
var chipsEl      = document.getElementById('chips');
var tableWrap    = document.getElementById('table-wrap');
var availabilitySection = document.getElementById('availability-section');
var availabilityGrid = document.getElementById('availability-grid');
var availabilityNote = document.getElementById('availability-note');
var nypSection   = document.getElementById('nyp-section');
var nypBody      = document.getElementById('nyp-body');
var matrixHead   = document.getElementById('matrix-head');
var matrixBody   = document.getElementById('matrix-body');
var issuesSec    = document.getElementById('issues-section');
var issuesList   = document.getElementById('issues-list');
var loadingMsg   = document.getElementById('loading-msg');

// --- Load seasons ---
apiFetch('seasons').then(function(seasons) {
  seasonSelect.innerHTML = '';
  (seasons || []).forEach(function(s, i) {
    var o = document.createElement('option');
    o.value = s.id; o.textContent = s.name;
    if (i === 0) o.selected = true;
    seasonSelect.appendChild(o);
  });
  if (seasons && seasons.length) loadSeason(seasons[0].id);
  else { loadingMsg.textContent = 'No seasons found.'; }
}).catch(function() { loadingMsg.textContent = 'Failed to load seasons.'; });

seasonSelect.addEventListener('change', function() { loadSeason(seasonSelect.value); });

function loadSeason(seasonId) {
  if (!seasonId) return;
  loadingMsg.style.display = 'block';
  loadingMsg.textContent = 'Loading games…';
  chipsEl.style.display = 'none';
  tableWrap.style.display = 'none';
  issuesSec.style.display = 'none';
  nypSection.style.display = 'none';
  availabilitySection.style.display = 'none';

  var range = getNext14DayRange();

  Promise.all([
    apiFetch('schedule', { seasonId: seasonId }),
    apiFetch('teams',    { seasonId: seasonId }),
    safeAvailabilityFetch(seasonId, range.start, range.end)
  ]).then(function(results) {
    var games = (results[0] || []).filter(function(g) { return g.status !== 'cancelled' && g.type !== 'playoff'; });
    var teams = results[1] || [];
    var availability = mergeLocalAvailability(results[2] || [], seasonId, range.start, range.end);
    renderAvailability(availability, range.start, range.end);
    render(games, teams);
  }).catch(function() {
    loadingMsg.textContent = 'Failed to load data.';
  });
}

function safeAvailabilityFetch(seasonId, startDate, endDate) {
  return apiFetch('teamAvailability', { seasonId: seasonId, startDate: startDate, endDate: endDate }).then(function(rows) {
    return Array.isArray(rows) ? rows : [];
  }).catch(function() { return []; });
}

function getNext14DayRange() {
  var start = getNextWeekStart();
  var end = new Date(start);
  end.setDate(start.getDate() + 13);
  return { start: toYmd(start), end: toYmd(end) };
}

function getNextWeekStart() {
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var start = new Date(today);
  var daysUntilSunday = (7 - today.getDay()) % 7;
  if (daysUntilSunday === 0) daysUntilSunday = 7;
  start.setDate(today.getDate() + daysUntilSunday);
  return start;
}

function mergeLocalAvailability(rows, seasonId, startDate, endDate) {
  var out = Array.isArray(rows) ? rows.slice() : [];
  try {
    var store = JSON.parse(localStorage.getItem('allinTeamAvailabilityDrafts') || '{}');
    Object.keys(store).forEach(function(key) {
      var item = store[key];
      if (!item || String(item.seasonId) !== String(seasonId)) return;
      (item.unavailableDates || []).forEach(function(date) {
        if (date < startDate || date > endDate) return;
        out.push({
          id: 'local-' + key + '-' + date,
          seasonId: item.seasonId,
          teamId: item.teamId,
          teamName: item.teamName,
          unavailableDate: date,
          note: item.note || '',
          updatedAt: item.updatedAt || ''
        });
      });
    });
  } catch (err) { /* ignore local fallback */ }
  return out;
}

function renderAvailability(rows, startDate, endDate) {
  availabilityGrid.innerHTML = '';
  availabilityNote.textContent = formatShortDate(startDate) + ' to ' + formatShortDate(endDate);
  var byDate = {};
  (rows || []).forEach(function(row) {
    var date = row.unavailableDate;
    if (!date) return;
    if (!byDate[date]) byDate[date] = [];
    if (!byDate[date].some(function(x) { return String(x.teamId) === String(row.teamId); })) byDate[date].push(row);
  });
  var cursor = parseYmd(startDate);
  for (var i = 0; i < 14; i++) {
    var ymd = toYmd(cursor);
    if (cursor.getDay() === 0 || cursor.getDay() === 6) {
      cursor.setDate(cursor.getDate() + 1);
      continue;
    }
    var dayRows = byDate[ymd] || [];
    var card = document.createElement('div');
    card.className = 'availability-day';
    var html = '<div class="availability-date">' + esc(formatLongDate(ymd)) + '</div>';
    if (dayRows.length === 0) {
      html += '<span class="availability-empty">All teams available</span>';
    } else {
      dayRows.sort(function(a, b) { return (a.teamName || '').localeCompare(b.teamName || ''); }).forEach(function(row) {
        html += '<span class="availability-team" title="' + esc(row.note || '') + '">' + esc(row.teamName || row.teamId || 'Team') + '</span>';
        if (row.note) html += '<span class="availability-note">' + esc(row.note) + '</span>';
      });
    }
    card.innerHTML = html;
    availabilityGrid.appendChild(card);
    cursor.setDate(cursor.getDate() + 1);
  }
  availabilitySection.style.display = 'block';
}

function render(games, teams) {
  loadingMsg.style.display = 'none';

  // --- Build team map ---
  var teamMap = {};
  teams.forEach(function(t) { teamMap[t.id] = t.name; });

  // Collect unique teams from games if not in teams list
  games.forEach(function(g) {
    if (!teamMap[g.homeTeamId]) teamMap[g.homeTeamId] = g.homeTeamName || g.homeTeamId;
    if (!teamMap[g.awayTeamId]) teamMap[g.awayTeamId] = g.awayTeamName || g.awayTeamId;
  });

  // --- Determine rounds by grouping unique game dates in ascending order ---
  var dateSet = {};
  games.forEach(function(g) { if (g.date) dateSet[g.date] = true; });
  var dates = Object.keys(dateSet).sort();
  var dateToRound = {};
  dates.forEach(function(d, i) { dateToRound[d] = i + 1; });
  var totalRounds = dates.length;

  // --- Build per-team schedule: teamId -> { roundNum: opponentName } ---
  var teamSchedule = {}; // teamId -> { 1: opp, 2: opp, ... }
  var teamIds = Object.keys(teamMap);
  teamIds.forEach(function(id) { teamSchedule[id] = {}; });

  games.forEach(function(g) {
    var round = g.date ? dateToRound[g.date] : null;
    if (!round) return;
    var homeId = g.homeTeamId, awayId = g.awayTeamId;
    var homeName = teamMap[homeId] || homeId;
    var awayName = teamMap[awayId] || awayId;
    if (!teamSchedule[homeId]) teamSchedule[homeId] = {};
    if (!teamSchedule[awayId]) teamSchedule[awayId] = {};
    // Store as array in case multiple games same round (to detect issues)
    if (!teamSchedule[homeId][round]) teamSchedule[homeId][round] = [];
    if (!teamSchedule[awayId][round]) teamSchedule[awayId][round] = [];
    teamSchedule[homeId][round].push(awayName);
    teamSchedule[awayId][round].push(homeName);
  });

  // --- Detect issues ---
  var issues = [];

  teamIds.forEach(function(tid) {
    var name = teamMap[tid];
    var sched = teamSchedule[tid];
    var allOpps = [];
    // Collect all opponents
    Object.keys(sched).forEach(function(r) {
      sched[r].forEach(function(opp) { allOpps.push(opp); });
    });
    // Total games check
    if (allOpps.length !== 7) {
      issues.push(name + ': expected 7 games, found ' + allOpps.length + '.');
    }
    // Duplicate opponent check
    var seen = {};
    allOpps.forEach(function(opp) {
      if (seen[opp]) { issues.push(name + ': duplicate opponent "' + opp + '".'); }
      seen[opp] = true;
    });
    // Multiple games same round
    Object.keys(sched).forEach(function(r) {
      if (sched[r].length > 1) {
        issues.push(name + ': multiple games in Round ' + r + ' (' + sched[r].join(', ') + ').');
      }
    });
  });

  // Remove duplicate issue messages
  var uniqueIssues = [];
  var seenIssues = {};
  issues.forEach(function(i) { if (!seenIssues[i]) { uniqueIssues.push(i); seenIssues[i] = true; } });

  // --- Render chips ---
  chipsEl.innerHTML = '';
  chipsEl.style.display = 'flex';
  var teamCount = teamIds.length;
  var gameCount = games.length;
  addChip(chipsEl, teamCount + ' Teams', 'ok');
  addChip(chipsEl, gameCount + ' Games', 'ok');
  addChip(chipsEl, totalRounds + ' Rounds', 'ok');
  if (uniqueIssues.length === 0) {
    addChip(chipsEl, '✓ All Clear', 'ok');
  } else {
    addChip(chipsEl, uniqueIssues.length + ' Issue' + (uniqueIssues.length > 1 ? 's' : '') + ' Found', 'warn');
  }

  // --- Render matrix ---
  matrixHead.innerHTML = '';
  matrixBody.innerHTML = '';

  var headRow = document.createElement('tr');
  var thTeam = document.createElement('th');
  thTeam.textContent = 'Team';
  headRow.appendChild(thTeam);
  for (var r = 1; r <= totalRounds; r++) {
    var th = document.createElement('th');
    th.textContent = 'R' + r;
    headRow.appendChild(th);
  }
  var thTotal = document.createElement('th');
  thTotal.textContent = 'Total';
  headRow.appendChild(thTotal);
  matrixHead.appendChild(headRow);

  // Sort teams alphabetically
  var sortedIds = teamIds.slice().sort(function(a, b) { return (teamMap[a] || '').localeCompare(teamMap[b] || ''); });

  // --- Render not-yet-played table (top) ---
  nypBody.innerHTML = '';
  sortedIds.forEach(function(tid) {
    var name = teamMap[tid];
    var sched = teamSchedule[tid];
    var playedSet = {};
    Object.keys(sched).forEach(function(r) {
      sched[r].forEach(function(opp) { playedSet[opp] = true; });
    });
    var unplayed = sortedIds
      .filter(function(oid) { return oid !== tid; })
      .map(function(oid) { return teamMap[oid]; })
      .filter(function(oname) { return !playedSet[oname]; })
      .sort();
    var tr = document.createElement('tr');
    var tdName = document.createElement('td');
    tdName.textContent = name;
    tr.appendChild(tdName);
    var tdOpps = document.createElement('td');
    if (unplayed.length === 0) {
      tdOpps.innerHTML = '<span class="nyp-none">✓ All opponents played</span>';
    } else {
      tdOpps.innerHTML = unplayed.map(function(o) {
        return '<span class="nyp-opp">' + esc(o) + '</span>';
      }).join('');
    }
    tr.appendChild(tdOpps);
    var tdCount = document.createElement('td');
    tdCount.innerHTML = '<span class="nyp-count ' + (unplayed.length === 0 ? 'zero' : 'some') + '">' + unplayed.length + '</span>';
    tr.appendChild(tdCount);
    nypBody.appendChild(tr);
  });
  nypSection.style.display = 'block';

  // --- Render matrix ---
  sortedIds.forEach(function(tid) {
    var name = teamMap[tid];
    var sched = teamSchedule[tid];
    var allOpps = [];
    Object.keys(sched).forEach(function(r) { sched[r].forEach(function(o) { allOpps.push(o); }); });

    // Check duplicates for coloring
    var oppCount = {};
    allOpps.forEach(function(o) { oppCount[o] = (oppCount[o] || 0) + 1; });

    var tr = document.createElement('tr');
    var tdName = document.createElement('td');
    tdName.textContent = name;
    tr.appendChild(tdName);

    for (var r = 1; r <= totalRounds; r++) {
      var td = document.createElement('td');
      var roundOpps = sched[r] || [];
      if (roundOpps.length === 0) {
        td.innerHTML = '<span class="cell-empty">—</span>';
      } else {
        td.innerHTML = roundOpps.map(function(opp) {
          var isDup = oppCount[opp] > 1;
          return '<span class="opp' + (isDup ? ' dup' : '') + '">' + esc(opp) + '</span>';
        }).join(' ');
      }
      tr.appendChild(td);
    }

    var tdTotal = document.createElement('td');
    var total = allOpps.length;
    tdTotal.innerHTML = '<span class="total ' + (total === 7 ? 'ok' : 'bad') + '">' + total + '</span>';
    tr.appendChild(tdTotal);

    matrixBody.appendChild(tr);
  });

  tableWrap.style.display = 'block';

  // --- Render issues ---
  issuesSec.style.display = 'block';
  issuesList.innerHTML = '';
  if (uniqueIssues.length === 0) {
    issuesList.innerHTML = '<div class="no-issues">✓ No issues detected — all teams have 7 games with unique opponents.</div>';
  } else {
    uniqueIssues.forEach(function(msg) {
      var div = document.createElement('div');
      div.className = 'issue-item';
      div.textContent = msg;
      issuesList.appendChild(div);
    });
  }
}

function addChip(container, label, type) {
  var span = document.createElement('span');
  span.className = 'chip chip-' + type;
  span.textContent = label;
  container.appendChild(span);
}

function toYmd(date) {
  var y = date.getFullYear();
  var m = String(date.getMonth() + 1).padStart(2, '0');
  var d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

function parseYmd(ymd) {
  var parts = ymd.split('-');
  return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
}

function formatShortDate(ymd) {
  var parts = ymd.split('-');
  return Number(parts[1]) + '/' + Number(parts[2]);
}

function formatLongDate(ymd) {
  var weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var d = parseYmd(ymd);
  return formatShortDate(ymd) + ' ' + weekdays[d.getDay()];
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
